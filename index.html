// ============================================================
function renderInbox(){
  if(!DB.inbox) DB.inbox=[];
  const items=DB.inbox;
  const unprocessed=items.filter(i=>!i.processed);
  const processed=items.filter(i=>i.processed);

  const typeIcons={task:'✅',idea:'💡',note:'📝',link:'🔗',waiting:'⏳',someday:'🌙',ref:'📚'};
  const typeLabels={task:'משימה',idea:'רעיון',note:'הערה',link:'קישור',waiting:'ממתין ל…',someday:'יום אחד',ref:'חומר עיון'};

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">
      <div>
        <div class="page-title">📥 אינבוקס GTD</div>
        <div class="page-subtitle">לכוד הכל — עבד בזמנים קבועים</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        ${unprocessed.length?`<span style="background:var(--red-bg);color:var(--red);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700">${unprocessed.length} לעיבוד</span>`:''}
        <button class="btn btn-ghost btn-sm" onclick="startWeeklyReview()">🔄 סקירה שבועית</button>
      </div>
    </div>

    <!-- CAPTURE BAR -->
    <div class="inbox-capture" id="inboxCapture">
      <div class="inbox-capture-main">
        <textarea id="inboxInput" class="inbox-textarea" placeholder="זרוק כאן כל מחשבה, רעיון, משימה, קישור... ↵ Enter לשמירה" rows="2" onkeydown="inboxKeydown(event)"></textarea>
        <button class="btn btn-primary" onclick="captureInbox()" style="flex-shrink:0">+ לכוד</button>
      </div>
      <div class="inbox-type-bar">
        ${Object.entries(typeLabels).map(([k,v])=>`
          <button class="inbox-type-btn${state.inboxType===k?' active':''}" onclick="setInboxType('${k}')">${typeIcons[k]} ${v}</button>
        `).join('')}
      </div>
    </div>

    <!-- UNPROCESSED -->
    ${unprocessed.length?`
      <div class="inbox-section-title">
        <span>⬇ לעיבוד (${unprocessed.length})</span>
        <button class="btn btn-ghost btn-sm" onclick="processAll()">עבד הכל</button>
      </div>
      <div class="inbox-list" id="inboxUnprocessed">
        ${unprocessed.map(item=>renderInboxItem(item,typeIcons,typeLabels)).join('')}
      </div>
    `:`
      <div style="text-align:center;padding:24px 0;color:var(--green);font-size:14px;font-weight:600">
        ✓ האינבוקס ריק — הכל עובד!
      </div>
    `}

    <!-- PROCESSED -->
    ${processed.length?`
      <div class="inbox-section-title" style="margin-top:20px;cursor:pointer" onclick="toggleProcessed()">
        <span style="color:var(--text3)">✓ עובד (${processed.length})</span>
        <span style="color:var(--text3);font-size:12px" id="processedToggleLabel">הצג ▼</span>
      </div>
      <div id="processedList" style="display:none">
        ${processed.map(item=>renderInboxItem(item,typeIcons,typeLabels,true)).join('')}
        <button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="clearProcessed()">🗑️ נקה עובד</button>
      </div>
    `:''}
  `;
}

function renderInboxItem(item,typeIcons,typeLabels,isProcessed=false){
  const age=getItemAge(item.created);
  return `
    <div class="inbox-item${isProcessed?' processed':''}" id="ii_${item.id}">
      <div class="inbox-item-row1">
        <span class="inbox-item-type-icon" title="${typeLabels[item.type]||item.type}">${typeIcons[item.type]||'📌'}</span>
        <span class="inbox-item-text">${escHtml(item.text)}</span>
        <span class="inbox-item-age">${age}</span>
      </div>
      ${item.note?`<div class="inbox-item-note">📎 ${escHtml(item.note)}</div>`:''}
      ${!isProcessed?`
        <div class="inbox-item-actions">
          <button class="iab task"  onclick="processAsTask('${item.id}')"    title="משימה">✅<span>משימה</span></button>
          <button class="iab project" onclick="processAsProject('${item.id}')" title="פרויקט">📁<span>פרויקט</span></button>
          <button class="iab someday" onclick="processAsSomeday('${item.id}')" title="יום אחד">🌙<span>יום אחד</span></button>
          <button class="iab ref"    onclick="processAsRef('${item.id}')"     title="עיון">📚<span>עיון</span></button>
          <button class="iab waiting" onclick="processAsWaiting('${item.id}')" title="ממתין">⏳<span>ממתין</span></button>
          <button class="iab delete" onclick="deleteInboxItem('${item.id}')"  title="מחק">🗑️</button>
        </div>
      `:`<div class="inbox-processed-label">✓ ${item.processedAs||'עובד'} · ${item.processedTime||''}</div>`}
    </div>
  `;
}

function toggleProcessed(){
  const el=document.getElementById('processedList');
  const lbl=document.getElementById('processedToggleLabel');
  if(!el) return;
  const show=el.style.display==='none';
  el.style.display=show?'block':'none';
  if(lbl) lbl.textContent=show?'הסתר ▲':'הצג ▼';
}

function inboxKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();captureInbox();}
}

function setInboxType(t){
  state.inboxType=t;
  document.querySelectorAll('.inbox-type-btn').forEach(b=>{
    b.classList.toggle('active',b.onclick?.toString().includes(`'${t}'`));
  });
  // re-render just the type bar
  document.querySelectorAll('.inbox-type-btn').forEach(b=>b.classList.remove('active'));
  const active=document.querySelector(`.inbox-type-btn[onclick="setInboxType('${t}')"]`);
  if(active) active.classList.add('active');
}

function captureInbox(){
  const inp=document.getElementById('inboxInput');
  const text=inp?.value?.trim();
  if(!text) return;
  if(!DB.inbox) DB.inbox=[];
  DB.inbox.unshift({
    id:uid(),
    text,
    type:state.inboxType||'task',
    created:new Date().toISOString(),
    processed:false,
    note:''
  });
  saveDB();
  inp.value='';
  inp.focus();
  renderContent();
  showToast('נלכד ✓');
}

  // open new task modal pre-filled

        <div class="form-group"><label class="form-label">סטטוס</label>
          <select class="form-input" id="pt_status">
            ${DB.customStatuses.map(s=>`<option>${s}</option>`).join('')}

          <select class="form-input" id="pt_priority">
            ${['דחופה','גבוהה','בינונית','נמוכה','ללא'].map(p=>`<option ${p==='בינונית'?'selected':''}>${p}</option>`).join('')}

function confirmProcessTask(inboxId){
  const name=document.getElementById('pt_name')?.value?.trim();
  if(!name) return;
  const task={
    id:uid(),
    listId:document.getElementById('pt_list')?.value||DB.lists[0]?.id,
    name,desc:'',
    status:document.getElementById('pt_status')?.value||'לביצוע',
    priority:document.getElementById('pt_priority')?.value||'בינונית',
    due:document.getElementById('pt_due')?.value||'',
    assignee:DB.user.avatar,tags:[],
    created:new Date().toISOString().slice(0,10),
    timeSpent:0,subtasks:[],customFields:{},comments:[],activity:[]
  };
  DB.tasks.push(task);
  markProcessed(inboxId,'משימה');
  closeModal();renderContent();showToast('משימה נוצרה ✓');
}

function processAsProject(id){
  const item=DB.inbox.find(i=>i.id===id);
  if(!item) return;
  showModal(`
    <div class="modal-header">
      <div class="modal-title-area"><div style="font-size:16px;font-weight:700">📁 הפוך לפרויקט (תיקייה חדשה)</div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:20px">
      <div class="form-group"><label class="form-label">שם הפרויקט</label>
        <input class="form-input" id="pp_name" value="${escAttr(item.text)}"></div>
      <div class="form-group"><label class="form-label">מרחב</label>
        <select class="form-input" id="pp_space">
          ${DB.spaces.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="confirmProcessProject('${id}')">📁 צור פרויקט</button>
    </div>
  `);
}

function confirmProcessProject(inboxId){
  const name=document.getElementById('pp_name')?.value?.trim();
  const spaceId=document.getElementById('pp_space')?.value;
  if(!name) return;
  const folder={id:uid(),spaceId,name};
  DB.folders.push(folder);
  DB.lists.push({id:uid(),spaceId,folderId:folder.id,name:'משימות',color:'#7c6af7'});
  markProcessed(inboxId,'פרויקט');
  closeModal();renderAll();showToast('פרויקט נוצר ✓');
}

function processAsSomeday(id){
  const item=DB.inbox.find(i=>i.id===id);
  if(!item) return;
  if(!DB.someday) DB.someday=[];
  DB.someday.push({id:uid(),text:item.text,created:new Date().toISOString()});
  markProcessed(id,'יום אחד');
  saveDB();renderContent();showToast('הועבר ל"יום אחד" 🌙');
}

function processAsRef(id){
  const item=DB.inbox.find(i=>i.id===id);
  if(!item) return;
  // create a doc
  DB.docs.push({
    id:uid(),spaceId:DB.spaces[0]?.id||'',
    title:item.text.slice(0,60),
    content:`<p>${escHtml(item.text)}</p>`,
    updated:new Date().toISOString().slice(0,10)
  });
  markProcessed(id,'עיון');
  saveDB();renderContent();showToast('נשמר כמסמך עיון 📚');
}

function processAsWaiting(id){
  const item=DB.inbox.find(i=>i.id===id);
  if(!item) return;
  const task={
    id:uid(),
    listId:DB.lists[0]?.id,
    name:item.text,desc:'',
    status:'ממתין',priority:'בינונית',
    due:'',assignee:DB.user.avatar,tags:['ממתין'],
    created:new Date().toISOString().slice(0,10),
    timeSpent:0,subtasks:[],customFields:{},comments:[],activity:[]
  };
  DB.tasks.push(task);
  markProcessed(id,'ממתין');
  saveDB();renderContent();showToast('נוסף כ"ממתין" ⏳');
}

function markProcessed(id,as){
  const item=DB.inbox.find(i=>i.id===id);
  if(item){
    item.processed=true;
    item.processedAs=as;
    item.processedTime=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    saveDB();
  }
}

function deleteInboxItem(id){
  DB.inbox=DB.inbox.filter(i=>i.id!==id);
  saveDB();renderContent();
}

function clearProcessed(){
  confirmDialog('למחוק את כל הפריטים המעובדים?',()=>{
    DB.inbox=DB.inbox.filter(i=>!i.processed);
    saveDB();renderContent();
  });
}

function processAll(){
  const items=DB.inbox.filter(i=>!i.processed);
  if(!items.length) return;
  state._guidedItems=items;
  state._guidedIdx=0;
  processItemGuided();
}

function processItemGuided(){
  const items=state._guidedItems||[];
  const idx=state._guidedIdx||0;
  if(idx>=items.length){showToast('עיבוד הושלם ✓');state._guidedItems=null;state._guidedIdx=0;renderContent();return;}
  const item=items[idx];
  const typeIcons={task:'✅',idea:'💡',note:'📝',link:'🔗',waiting:'⏳',someday:'🌙',ref:'📚'};
  showModal(`
    <div class="modal-header">
      <div class="modal-title-area">
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px">עיבוד ${idx+1} מתוך ${items.length}</div>
        <div style="font-size:17px;font-weight:700;line-height:1.4">${escHtml(item.text)}</div>
        <div style="margin-top:6px"><span style="font-size:12px;color:var(--text3)">${typeIcons[item.type]||'📌'} ${item.type}</span></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:16px 20px">
      <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px">מה זה?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-ghost" style="justify-content:flex-start;gap:10px;padding:12px 14px" onclick="guidedAction('task','${item.id}')">
          <span style="font-size:18px">✅</span><span>משימה</span>
        </button>
        <button class="btn btn-ghost" style="justify-content:flex-start;gap:10px;padding:12px 14px" onclick="guidedAction('project','${item.id}')">
          <span style="font-size:18px">📁</span><span>פרויקט</span>
        </button>
        <button class="btn btn-ghost" style="justify-content:flex-start;gap:10px;padding:12px 14px" onclick="guidedAction('someday','${item.id}')">
          <span style="font-size:18px">🌙</span><span>יום אחד</span>
        </button>
        <button class="btn btn-ghost" style="justify-content:flex-start;gap:10px;padding:12px 14px" onclick="guidedAction('ref','${item.id}')">
          <span style="font-size:18px">📚</span><span>חומר עיון</span>
        </button>
        <button class="btn btn-ghost" style="justify-content:flex-start;gap:10px;padding:12px 14px" onclick="guidedAction('waiting','${item.id}')">
          <span style="font-size:18px">⏳</span><span>ממתין ל…</span>
        </button>
        <button class="btn btn-danger" style="justify-content:flex-start;gap:10px;padding:12px 14px" onclick="guidedAction('delete','${item.id}')">
          <span style="font-size:18px">🗑️</span><span>מחק</span>
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal();state._guidedItems=null">עצור עיבוד</button>
      <button class="btn btn-ghost btn-sm" onclick="guidedNext()">דלג ›</button>
    </div>
  `);
}

function guidedAction(action,itemId){
  if(action==='task'){processAsTask(itemId);return;}// processAsTask will close modal
  if(action==='project'){processAsProject(itemId);return;}
  if(action==='someday'){processAsSomeday(itemId);}
  else if(action==='ref'){processAsRef(itemId);}
  else if(action==='waiting'){processAsWaiting(itemId);}
  else if(action==='delete'){deleteInboxItem(itemId);}
  guidedNext();
}

function guidedNext(){
  state._guidedIdx=(state._guidedIdx||0)+1;
  closeModal();
  setTimeout(processItemGuided,120);
}

function getItemAge(iso){
  if(!iso) return '';
  const diff=Date.now()-new Date(iso).getTime();
  const mins=Math.floor(diff/60000);
  if(mins<60) return `לפני ${mins} דק'`;
  const hrs=Math.floor(mins/60);
  if(hrs<24) return `לפני ${hrs} שע'`;
  const days=Math.floor(hrs/24);
  return `לפני ${days} ימים`;
}

function toggleHelpItem(id){
  const el=document.getElementById(id);
  if(!el) return;
  const ans=el.querySelector('.help-a');

  const open=ans.style.display!=='none'&&ans.style.display!=='';
  ans.style.display=open?'none':'block';
  if(arrow) arrow.style.transform=open?'':'rotate(180deg)';
  el.classList.toggle('open',!open);
}

function highlight(text,q){
  if(!q) return text;
  return text.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark style="background:rgba(124,106,247,0.3);color:var(--accent2);border-radius:2px;padding:0 2px">${m}</mark>`);
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderFilterBar(tasks){
  const statuses=[...new Set(tasks.map(t=>t.status))];
  const priorities=[...new Set(tasks.map(t=>t.priority))];
  return `
    <div class="filter-bar">
      <span style="font-size:12px;color:var(--text3)">סנן:</span>

        <div class="filter-chip${state.filterStatus.includes(s)?' active':''}" onclick="toggleFilter('status','${s}')">
          <span style="width:8px;height:8px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'}"></span>
          ${s}
        </div>
      `).join('')}
      <div style="width:1px;background:var(--border);margin:0 4px"></div>
      ${priorities.map(p=>`
        <div class="filter-chip${state.filterPriority.includes(p)?' active':''}" onclick="toggleFilter('priority','${p}')">
          ${PRIORITY_ICONS[p]||''} ${p}
        </div>
      `).join('')}
      ${state.filterStatus.length||state.filterPriority.length?`<button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ נקה</button>`:''}

        <span style="font-size:12px;color:var(--text3)">${tasks.length} משימות</span>
      </div>
    </div>
  `;
}

function toggleFilter(type,val){
  const arr=type==='status'?state.filterStatus:state.filterPriority;
  const idx=arr.indexOf(val);
  if(idx>-1) arr.splice(idx,1); else arr.push(val);
  renderContent();
}
function clearFilters(){state.filterStatus=[];state.filterPriority=[];renderContent();}

function applyFilters(tasks){
  let t=tasks;
  if(state.filterStatus.length) t=t.filter(x=>state.filterStatus.includes(x.status));
  if(state.filterPriority.length) t=t.filter(x=>state.filterPriority.includes(x.priority));
  if(state.searchQuery) t=t.filter(x=>x.name.includes(state.searchQuery)||x.desc&&x.desc.includes(state.searchQuery));
  return t;
}

function globalSearchFn(q){state.searchQuery=q;if(state.view==='list-view'||state.view==='my-tasks') renderContent();}

function sortBy(field){
  if(state.sortBy===field) state.sortDir=state.sortDir==='asc'?'desc':'asc';

}

// ============================================================
// TASK OPERATIONS
// ============================================================
function updateTaskField(id,field,val){
  const t=DB.tasks.find(x=>x.id===id);
  if(t){t[field]=val;saveDB();renderContent();}
}
function updateTaskTags(id,val){
  const t=DB.tasks.find(x=>x.id===id);
  if(t){t.tags=val.split(',').map(s=>s.trim()).filter(Boolean);saveDB();}
}
function toggleTaskDone(id,done){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  t.status=done?'הושלם':'לביצוע';
  // auto-create next recurrence when completing a recurring task
  if(done && t.recurrence && t.due){
    const nextDate=calcNextDate(t.due,t.recurrence);
    if(nextDate){
      const next=JSON.parse(JSON.stringify(t));
      next.id=uid();
      next.status='לביצוע';
      next.due=nextDate;
      next.subtasks=(t.subtasks||[]).map(s=>({...s,done:false}));
      next.comments=[];
      next.timeSpent=0;
      DB.tasks.push(next);
      showToast(`משימה חוזרת נוצרה: ${formatDate(nextDate)} 🔄`);
    }
  }
  saveDB();renderContent();
}

function calcNextDate(dateStr,recurrence){
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  switch(recurrence){
    case 'daily':     d.setDate(d.getDate()+1);break;
    case 'weekly':    d.setDate(d.getDate()+7);break;
    case 'biweekly':  d.setDate(d.getDate()+14);break;
    case 'monthly':   d.setMonth(d.getMonth()+1);break;
    case 'yearly':    d.setFullYear(d.getFullYear()+1);break;
    default: return null;
  }
  return d.toISOString().slice(0,10);
}

const RECURRENCE_LABELS={daily:'יומי',weekly:'שבועי',biweekly:'דו-שבועי',monthly:'חודשי',yearly:'שנתי'};
function cycleStatus(id){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  const i=DB.customStatuses.indexOf(t.status);
  t.status=DB.customStatuses[(i+1)%DB.customStatuses.length];
  saveDB();closeModal();renderContent();
}
function cyclePriority(id){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  const p=['דחופה','גבוהה','בינונית','נמוכה','ללא'];
  const i=p.indexOf(t.priority);
  t.priority=p[(i+1)%p.length];
  saveDB();closeModal();renderContent();
}
function deleteTask(id){
  confirmDialog('למחוק משימה זו?',()=>{DB.tasks=DB.tasks.filter(t=>t.id!==id);saveDB();closeModal();renderContent();});
}
function duplicateTask(id){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t){closeModal();return;}
  const copy=JSON.parse(JSON.stringify(t));
  copy.id=uid();copy.name='(עותק) '+copy.name;
  DB.tasks.push(copy);saveDB();closeModal();renderContent();showToast('משימה שוכפלה ✓');
}
function addSubtask(taskId){
  const name=prompt('שם תת-המשימה:');
  if(name){
    const t=DB.tasks.find(x=>x.id===taskId);
    if(t){if(!t.subtasks)t.subtasks=[];t.subtasks.push({id:uid(),name,done:false});saveDB();closeModal();openTask(taskId);}
  }
}
function toggleSubtask(taskId,stId,done){
  const t=DB.tasks.find(x=>x.id===taskId);
  if(t){const st=t.subtasks.find(s=>s.id===stId);if(st){st.done=done;saveDB();}}
}
function updateSubtaskName(taskId,stId,val){
  const t=DB.tasks.find(x=>x.id===taskId);
  if(t){const st=t.subtasks.find(s=>s.id===stId);if(st){st.name=val;saveDB();}}
}
function deleteSubtask(taskId,stId){
  const t=DB.tasks.find(x=>x.id===taskId);
  if(t){t.subtasks=t.subtasks.filter(s=>s.id!==stId);saveDB();closeModal();openTask(taskId);}
}
function addComment(taskId){
  const inp=document.getElementById('commentInput');
  if(!inp||!inp.value.trim()) return;
  const t=DB.tasks.find(x=>x.id===taskId);
  if(t){
    if(!t.comments)t.comments=[];
    t.comments.push({id:uid(),author:DB.user.avatar,text:inp.value.trim(),time:'עכשיו'});
    saveDB();closeModal();openTask(taskId);
  }
}
function updateCustomField(taskId,key,val){
  const t=DB.tasks.find(x=>x.id===taskId);
  if(t){t.customFields[key]=val;saveDB();}
}
function deleteCustomField(taskId,key){
  const t=DB.tasks.find(x=>x.id===taskId);
  if(t&&t.customFields){delete t.customFields[key];saveDB();closeModal();openTask(taskId);}
}

function saveGoal(id){
  const g=DB.goals.find(x=>x.id===id);
  if(!g) return;
  const title=document.getElementById('eg_title')?.value?.trim();
  if(!title){showToast('חובה להזין כותרת ⚠️');return;}
  g.title=title;
  g.emoji=document.getElementById('eg_emoji')?.value||'🎯';
  g.deadline=document.getElementById('eg_deadline')?.value||'';
  // collect targets from DOM
  const rows=document.querySelectorAll('.eg-target-row');
  g.targets=Array.from(rows).map(row=>{
    const get=f=>row.querySelector(`[data-field="${f}"]`)?.value||'';
    return{
      id:uid(),
      name:get('name').trim()||'target',
      current:parseFloat(get('current'))||0,
      total:parseFloat(get('total'))||100,
      unit:get('unit').trim()
    };
  }).filter(t=>t.name!=='target'||t.total>0);
  saveDB();closeModal();renderContent();showToast('יעד עודכן ✓');
}

          ${DB.spaces.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>

    </div>

      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="createDoc()">צור מסמך</button>
    </div>
  `);
}
function createDoc(){
  const title=document.getElementById('nd_title')?.value?.trim();

  const doc={id:uid(),spaceId:document.getElementById('nd_space')?.value,title,content:'',updated:new Date().toISOString().slice(0,10)};
  DB.docs.push(doc);saveDB();closeModal();state.editingDoc=doc.id;renderContent();
}

// ============================================================
// GIST SYNC
// ============================================================
async function syncToGist(){
  if(!DB.gistToken||!DB.gistId){showToast('חסרים Token ו-Gist ID ⚠️');return;}
  showToast('שומר ל-Gist...');
  try{
    const res=await fetch(`https://api.github.com/gists/${DB.gistId}`,{
      method:'PATCH',
      headers:{'Authorization':`token ${DB.gistToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'data.json':{content:JSON.stringify(DB)}}})
    });
    if(res.ok) showToast('נשמר בהצלחה ל-Gist ✓');
    else showToast('שגיאה: '+res.status+' ⚠️');
  }catch(e){showToast('שגיאת רשת ⚠️');}
}
async function syncFromGist(){
  if(!DB.gistToken||!DB.gistId){showToast('חסרים Token ו-Gist ID ⚠️');return;}
  showToast('טוען מ-Gist...');
  try{
    const res=await fetch(`https://api.github.com/gists/${DB.gistId}`,{headers:{'Authorization':`token ${DB.gistToken}`}});
    if(!res.ok){showToast('שגיאה: '+res.status+' ⚠️');return;}
    const data=await res.json();
    const content=data.files?.['data.json']?.content;
    if(content){DB=JSON.parse(content);localStorage.setItem(STORAGE_KEY,content);renderAll();showToast('נטען בהצלחה מ-Gist ✓');}
    else showToast('לא נמצא קובץ data.json ⚠️');
  }catch(e){showToast('שגיאת רשת ⚠️');}
}

// DATA MANAGEMENT
// ============================================================
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='clickup-he-backup.json';a.click();
  showToast('יוצא ✓');
}
function importDataBtn(){document.getElementById('importFile')?.click();}
function importDataFile(inp){
  const file=inp.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      DB=JSON.parse(e.target.result);
      localStorage.setItem(STORAGE_KEY,e.target.result);
      renderAll();showToast('יובא בהצלחה ✓');
    }catch{showToast('קובץ לא תקין ⚠️');}
  };
  r.readAsText(file);
}
function resetData(){
  confirmDialog('איפוס מלא ימחק את כל הנתונים. להמשיך?',()=>{
    DB=defaultDB();saveDB();renderAll();showToast('אופס ✓');
  },'אפס הכל');
}

function showModal(html){
  const box=document.getElementById('modalBox');
  const overlay=document.getElementById('modalOverlay');
  box.innerHTML=html;
  overlay.classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('modalBox').innerHTML='';
}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay')) closeModal();}


// ============================================================
// TOUCH / SWIPE
// ============================================================
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
    // swipe left (RTL: close sidebar) / swipe right (RTL: open sidebar)
    const sb=document.getElementById('sidebar');
    if(dx<-50&&!sb.classList.contains('collapsed')) closeSidebarMobile();
    if(dx>50&&sb.classList.contains('collapsed')&&touchStartX<40) toggleSidebar();
    // swipe down to close modal
    if(dy>80&&Math.abs(dy)>Math.abs(dx)){
      const overlay=document.getElementById('modalOverlay');
      if(overlay&&!overlay.classList.contains('hidden')) closeModal();
    }
  }
},{passive:true});
