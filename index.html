<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מנהל משימות">
<meta name="theme-color" content="#0f0f13">
<title>מנהל משימות מתקדם</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TASK MANAGER — STYLESHEET
   1. Tokens
   2. Base
   3. Layout
   4. Shared Components
   5. Feature Sections
   6. Utilities
   7. Responsive / Mobile
   ============================================================ */

/* ============================================================
   1. TOKENS
   ============================================================ */
:root {
  /* Backgrounds */
  --bg:  #0f0f13;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --bg4: #262633;

  /* Borders */
  --border:  #2e2e3e;
  --border2: #3a3a4e;

  /* Text */
  --text:  #e8e8f0;
  --text2: #a0a0b8;
  --text3: #606078;

  /* Accent */
  --accent:    #7c6af7;
  --accent2:   #9d8fff;
  --accent-bg: rgba(124,106,247,0.12);

  /* Semantic colours — value + tinted bg */
  --green:  #22c97a;  --green-bg:  rgba(34,201,122,0.12);
  --red:    #f76a6a;  --red-bg:    rgba(247,106,106,0.12);
  --orange: #f7a84a;  --orange-bg: rgba(247,168,74,0.12);
  --blue:   #4ab4f7;  --blue-bg:   rgba(74,180,247,0.12);
  --yellow: #f7e24a;  --yellow-bg: rgba(247,226,74,0.12);
  --pink:   #f76acd;  --pink-bg:   rgba(247,106,205,0.12);

  /* Layout */
  --sidebar-w: 260px;
  --header-h:  56px;

  /* Radii */
  --radius:    10px;
  --radius-sm: 6px;

  /* Elevation */
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);

  /* Motion */
  --transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
}

/* ============================================================
   2. BASE
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Animations */
@keyframes modalIn{from{opacity:0;transform:translateY(-16px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ============================================================
   3. LAYOUT
   ============================================================ */

/* App shell */
#app{display:flex;height:100vh;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#content{flex:1;overflow:auto;padding:20px}

/* Sidebar structure */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:var(--transition);z-index:10}
#sidebar.collapsed{width:0;min-width:0}
.sb-top{padding:12px;border-bottom:1px solid var(--border)}
.sb-bottom{padding:12px;border-top:1px solid var(--border)}
.sb-nav{flex:1;overflow-y:auto;padding:8px}

/* Sidebar logo */
.sb-logo{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.sb-logo:hover{background:var(--bg3)}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--pink));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-logo-text{font-weight:800;font-size:16px;letter-spacing:-0.5px}
.sb-logo-sub{font-size:11px;color:var(--text3)}

/* Sidebar search */
.sb-search{padding:8px 12px}
.sb-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:var(--transition)}
.sb-search input:focus{border-color:var(--accent);background:var(--bg4)}
.sb-search input::placeholder{color:var(--text3)}

/* Sidebar sections */
.sb-section{margin-bottom:4px}
.sb-section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text3);font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition);user-select:none}
.sb-section-header:hover{color:var(--text2);background:var(--bg3)}
.sb-section-header .arrow{font-size:10px;transition:var(--transition)}
.sb-section-header.open .arrow{transform:rotate(90deg)}
.sb-section-items{overflow:hidden;max-height:0;transition:max-height 0.25s ease}
.sb-section-items.open{max-height:2000px}

/* Sidebar nav items */
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;transition:var(--transition);user-select:none;position:relative}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent2)}
.sb-item .icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.sb-item .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.sb-item .count{color:var(--text3);font-size:11px}
.sb-item-sub{padding-right:20px}

/* Sidebar space items */
.sb-space{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);user-select:none}
.sb-space:hover{background:var(--bg3)}
.sb-space-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sb-space-name{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-space-actions{display:none;gap:2px}
.sb-space:hover .sb-space-actions{display:flex}

/* Sidebar user */
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.sb-user:hover{background:var(--bg3)}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:11px;color:var(--text3)}

/* Header */
#header{height:var(--header-h);min-height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:5}
.header-toggle{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:var(--radius-sm);transition:var(--transition);font-size:16px;display:flex;align-items:center}
.header-toggle:hover{background:var(--bg3);color:var(--text)}
.header-breadcrumb{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.header-breadcrumb .crumb{color:var(--text3);font-size:13px;cursor:pointer;transition:var(--transition);white-space:nowrap}
.header-breadcrumb .crumb:hover{color:var(--text)}
.header-breadcrumb .sep{color:var(--text3);font-size:11px}
.header-breadcrumb .current{color:var(--text);font-weight:600}
.header-actions{display:flex;align-items:center;gap:6px}

/* ============================================================
   4. SHARED COMPONENTS
   ============================================================ */

/* --- Shared: card panel ---
   Used by: .dash-card, .doc-card, .goal-card, .board-card,
            .auto-rule, .inbox-item, .time-tracker, .help-section
   Common pattern: bg2 + border + radius + transition
   Each component keeps its own padding/margin. */
.dash-card,
.doc-card,
.goal-card,
.auto-rule,
.help-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);transition:var(--transition)}
.dash-card:hover,
.doc-card:hover,
.goal-card:hover,
.auto-rule:hover{border-color:var(--border2)}

/* --- Shared: panel-with-bg3-header (section header row) ---
   Pattern: flex + align-center + padding + bg3 + border-bottom */
.list-group-header,
.board-col-header,
.help-section-header,
.notif-header,
.col-header{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.list-group-header{padding:10px 14px;background:var(--bg3);cursor:pointer;user-select:none}
.list-group-header:hover{background:var(--bg4)}
.board-col-header{padding:12px 14px}
.help-section-header{padding:12px 16px;background:var(--bg3);gap:10px}
.notif-header{padding:14px 16px;justify-content:space-between;font-weight:600}
.col-header{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text3);background:var(--bg3);text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;z-index:3}

/* --- Shared: list-row (border-bottom separator rows) ---
   Pattern: flex + align-center + gap + padding + border-bottom + last:no-border
   Used by: .dash-list-item, .time-log-row, .subtask-item,
            .activity-item, .comment-item, .cf-item, .db-task-row */
.dash-list-item,
.time-log-row,
.subtask-item,
.activity-item,
.comment-item,
.cf-item,
.db-task-row{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);font-size:13px}
.dash-list-item:last-child,
.time-log-row:last-child,
.subtask-item:last-child,
.activity-item:last-child,
.comment-item:last-child,
.cf-item:last-child,
.db-task-row:last-child{border-bottom:none}
/* individual padding/cursor overrides */
.dash-list-item{padding:8px 0}
.time-log-row{padding:8px 0}
.subtask-item{padding:7px 0}
.activity-item{padding:8px 0}
.comment-item{padding:10px 0;align-items:flex-start}
.cf-item{padding:8px 0}
.db-task-row{padding:10px 14px;cursor:pointer;transition:var(--transition);-webkit-tap-highlight-color:transparent}
.db-task-row:active{background:var(--bg3)}

/* --- Shared: meta-text (small secondary text) ---
   Pattern: font-size 11-12px + color var(--text3) */
.sb-logo-sub,
.sb-user-role,
.sb-item .count,
.task-due,
.task-subtask-count,
.board-card-due,
.cal-more,
.gantt-day-label,
.dash-stat-label,
.notif-time,
.activity-time,
.comment-time,
.cf-label,
.doc-card-meta,
.goal-owner,
.auto-rule-desc,
.weekly-step-desc,
.help-q-arrow,
.settings-row-desc,
.inbox-item-age,
.inbox-item-note,
.inbox-processed-label,
.db-kpi-label,
.iab span{color:var(--text3)}
/* sizes are kept per-element since they differ (10-12px) */
.task-due{font-size:11px;white-space:nowrap;flex-shrink:0}
.task-due.overdue{color:var(--red)}
.task-due.today{color:var(--orange)}
.task-subtask-count{font-size:11px;display:flex;align-items:center;gap:3px}
.board-card-due{font-size:11px}
.cal-more{font-size:11px;cursor:pointer;padding:1px 4px}
.gantt-day-label{font-size:11px;font-weight:600;text-align:center;position:absolute;top:50%;transform:translateY(-50%)}
.dash-stat-label{font-size:12px}
.notif-time{font-size:11px}
.activity-time{font-size:11px}
.comment-time{font-size:11px;margin-right:6px}
.cf-label{width:100px;flex-shrink:0}
.doc-card-meta{font-size:11px}
.goal-owner{font-size:12px}
.auto-rule-desc{font-size:12px}
.weekly-step-desc{font-size:12px}
.help-q-arrow{font-size:10px;flex-shrink:0;transition:transform 0.15s ease}
.settings-row-desc{font-size:12px;margin-top:2px}
.inbox-item-age{font-size:10px;flex-shrink:0;white-space:nowrap}
.inbox-item-note{font-size:11px;margin-bottom:5px;padding-right:20px}
.inbox-processed-label{font-size:10px;padding-top:2px}
.db-kpi-label{font-size:11px;margin-top:4px;font-weight:500}
.iab span{font-size:10px}

/* --- Shared: section-label (uppercase small headings inside panels) ---
   Used by: .modal-section-title, .inbox-section-title */
.modal-section-title,
.inbox-section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.inbox-section-title{display:flex;align-items:center;justify-content:space-between;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* --- Shared: ui-input (all text inputs/textareas share base) ---
   Unique padding/width set per-element below */
.input,
.form-input,
.cf-input,
.quick-add-input,
.modal-desc,
.comment-input input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:var(--transition)}
.input:focus,
.form-input:focus,
.cf-input:focus,
.quick-add-input:focus,
.modal-desc:focus,
.comment-input input:focus{border-color:var(--accent)}
.input::placeholder,
.form-input::placeholder,
.cf-input::placeholder,
.quick-add-input::placeholder,
.modal-desc::placeholder,
.comment-input input::placeholder{color:var(--text3)}
/* per-element specifics */
.input{padding:8px 12px;width:100%}
.form-input{width:100%;padding:9px 12px}
.cf-input{padding:4px 8px;width:100%;border-radius:4px}
.quick-add-input{flex:1;border-width:1.5px;border-color:var(--accent);padding:7px 12px}
.modal-desc{width:100%;padding:10px;resize:vertical;min-height:80px;line-height:1.6}
.comment-input input{flex:1;padding:8px 12px}
select.form-input option{background:var(--bg3)}
.inline-edit{background:none;border:none;border-bottom:1px solid transparent;color:var(--text);font-family:inherit;font-size:inherit;font-weight:inherit;outline:none;width:100%;transition:var(--transition);cursor:pointer}
.inline-edit:hover{border-bottom-color:var(--border2)}
.inline-edit:focus{border-bottom-color:var(--accent);cursor:text;background:var(--bg3);padding:2px 6px;border-radius:4px 4px 0 0}

/* --- Buttons --- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:var(--transition);white-space:nowrap}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(247,106,106,0.2)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-icon{padding:6px;background:transparent;border:none;color:var(--text3);cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition);font-size:15px;display:flex;align-items:center}
.btn-icon:hover{background:var(--bg3);color:var(--text)}

/* --- View tabs --- */
.view-tabs{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:var(--radius-sm)}
.view-tab{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text3);transition:var(--transition);display:flex;align-items:center;gap:5px;white-space:nowrap;border:none;background:none;font-family:inherit}
.view-tab:hover{color:var(--text2)}
.view-tab.active{background:var(--bg4);color:var(--text);box-shadow:var(--shadow-sm)}

/* --- Form layout --- */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}

/* --- Badges --- */
.status-badge,
.priority-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500}

/* --- Avatar --- */
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}

/* --- Toggle switch --- */
.toggle{width:40px;height:22px;background:var(--bg4);border-radius:11px;cursor:pointer;position:relative;transition:var(--transition);flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;right:3px;transition:var(--transition)}
.toggle.on::after{right:21px}

/* --- Filter chips --- */
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 0;flex-wrap:wrap}
.filter-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2);cursor:pointer;transition:var(--transition)}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.filter-chip .remove{color:var(--text3);margin-right:2px}
.filter-chip .remove:hover{color:var(--red)}

/* --- Progress bar --- */
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

/* --- Modal --- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:modalIn 0.2s ease;position:relative}
.modal-header{display:flex;align-items:flex-start;gap:14px;padding:20px 20px 0}
.modal-title-area{flex:1}
.modal-task-name{width:100%;background:none;border:none;color:var(--text);font-family:inherit;font-size:18px;font-weight:700;outline:none;resize:none;line-height:1.3}
.modal-task-name::placeholder{color:var(--text3)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;font-size:18px;transition:var(--transition);flex-shrink:0}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{display:flex;min-height:400px}
.modal-left{flex:1;padding:16px 20px;border-left:1px solid var(--border);overflow-y:auto;min-width:0}
.modal-right{width:230px;padding:16px;overflow-y:auto}
.modal-section{margin-bottom:18px}
.modal-field{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.modal-field-label{font-size:12px;color:var(--text3);width:70px;flex-shrink:0}
.modal-field-val{flex:1;font-size:13px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}

/* --- Confirm dialog --- */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:320px;box-shadow:var(--shadow);animation:modalIn 0.15s ease}
.confirm-msg{padding:20px 20px 16px;font-size:15px;font-weight:500;line-height:1.5;text-align:center}
.confirm-btns{display:flex;gap:8px;padding:0 16px 16px}
.confirm-btns .btn{flex:1;justify-content:center}

/* --- Dropdown --- */
.select-wrap{position:relative;display:inline-block}
.custom-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:var(--transition)}
.custom-select:hover{border-color:var(--border2)}
.dropdown{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:50;min-width:160px;overflow:hidden;animation:dropIn 0.12s ease}
.dropdown.hidden{display:none}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;transition:var(--transition)}
.dropdown-item:hover{background:var(--bg4)}
.dropdown-item.active{color:var(--accent2)}
.dropdown-sep{height:1px;background:var(--border);margin:4px 0}
.dropdown-header{padding:6px 12px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}

/* --- Notification panel --- */
.notif-panel{position:fixed;top:60px;left:20px;width:340px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:90;max-height:500px;overflow-y:auto;animation:dropIn 0.15s ease}
.notif-panel.hidden{display:none}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:var(--accent-bg)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.notif-text{font-size:13px;flex:1}

/* --- Column header --- */
.col-header .col{display:flex;align-items:center;gap:4px;cursor:pointer;transition:var(--transition)}
.col-header .col:hover{color:var(--text)}
.col-header .sort-icon{font-size:10px}

/* ============================================================
   5. FEATURE SECTIONS
   ============================================================ */

/* --- List view --- */
.list-view{}
.list-group{margin-bottom:12px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.list-group-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.list-group-name{font-weight:600;font-size:13px;flex:1}
.list-group-count{color:var(--text3);font-size:12px}
.list-group-arrow{color:var(--text3);font-size:11px;transition:var(--transition)}
.list-group-arrow.open{transform:rotate(90deg)}
.list-group-body{overflow:hidden}

.task-row{display:flex;align-items:center;padding:0;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition);background:var(--bg2)}
.task-row:hover{background:var(--bg3)}
.task-row:last-child{border-bottom:none}
.task-row.selected{background:var(--accent-bg)}
.task-check{width:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:10px 0}
.task-check input[type=checkbox]{appearance:none;width:16px;height:16px;border:2px solid var(--border2);border-radius:50%;cursor:pointer;transition:var(--transition);flex-shrink:0}
.task-check input[type=checkbox]:checked{background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 6l3 3 5-5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-size:10px;background-repeat:no-repeat;background-position:center}
.task-main{flex:1;display:flex;align-items:center;gap:10px;padding:9px 10px 9px 0;min-width:0}
.task-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:var(--transition)}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-tags{display:flex;gap:4px;flex-shrink:0}
.tag{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.task-meta{display:flex;align-items:center;gap:6px;padding:9px 14px 9px 10px;flex-shrink:0}
.task-priority{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.task-assignee{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

.add-task-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--bg2);transition:var(--transition);cursor:pointer;color:var(--text3);font-size:13px}
.add-task-row:hover{background:var(--bg3);color:var(--text2)}
.quick-add-row{border-top:1px solid var(--border);background:var(--bg2)}
.quick-add-trigger{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--text3);font-size:13px;transition:var(--transition)}
.quick-add-trigger:hover{background:var(--bg3);color:var(--accent2)}
.quick-add-plus{font-size:16px;line-height:1;color:var(--accent);opacity:0.7}
.quick-add-trigger:hover .quick-add-plus{opacity:1}
.quick-add-label{font-size:13px}
.quick-add-form{display:flex;align-items:center;gap:6px;padding:6px 10px}
.quick-add-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer;font-size:14px;font-weight:700;transition:var(--transition);flex-shrink:0}
.quick-add-btn:hover{background:var(--accent2)}

/* --- Board view --- */
.board-view{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:10px;min-height:200px}
.board-col{width:270px;min-width:270px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.board-col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.board-col-name{font-weight:600;font-size:13px;flex:1}
.board-col-count{color:var(--text3);font-size:12px}
.board-col-body{flex:1;padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;max-height:calc(100vh - 250px)}
.board-add{padding:8px 14px 10px;border-top:1px solid var(--border)}
.board-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:var(--transition)}
.board-card:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.board-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.board-card-name{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.board-card-priority{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.board-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.board-card-footer{display:flex;align-items:center;justify-content:space-between}
.board-card-meta{display:flex;align-items:center;gap:6px}

/* --- Calendar view --- */
.calendar-view{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.cal-title{font-weight:700;font-size:16px}
.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-name{padding:10px;text-align:center;font-size:12px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border)}
.cal-cell{min-height:100px;padding:6px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);position:relative;vertical-align:top;transition:var(--transition)}
.cal-cell:hover{background:var(--bg3)}
.cal-cell:nth-child(7n){border-left:none}
.cal-cell.other-month .cal-date{color:var(--text3)}
.cal-cell.today .cal-date{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cal-date{font-size:12px;font-weight:600;margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-task{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:var(--transition)}
.cal-task:hover{opacity:0.8}

/* --- Gantt view --- */
.gantt-view{overflow:auto}
.gantt-wrap{display:flex;min-width:900px}
.gantt-left{width:260px;min-width:260px;background:var(--bg2);border-left:1px solid var(--border)}
.gantt-right{flex:1;overflow-x:auto}
.gantt-header{height:40px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:12px;font-weight:600;color:var(--text3)}
.gantt-row{height:40px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:13px;transition:var(--transition)}
.gantt-row:hover{background:var(--bg3)}
.gantt-timeline-header{height:40px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;position:relative;overflow:hidden}
.gantt-timeline-row{height:40px;border-bottom:1px solid var(--border);position:relative;background:var(--bg2);transition:var(--transition)}
.gantt-timeline-row:hover{background:var(--bg3)}
.gantt-bar{position:absolute;top:8px;height:24px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#fff;overflow:hidden;white-space:nowrap;cursor:pointer;transition:var(--transition)}
.gantt-bar:hover{filter:brightness(1.15)}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:0.7;z-index:2}

/* --- Dashboard --- */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.dash-card{padding:18px}
.dash-card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.dash-stat{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.dash-stat-change{font-size:12px;margin-top:8px;display:flex;align-items:center;gap:4px}
.dash-stat-change.up{color:var(--green)}
.dash-stat-change.down{color:var(--red)}
.dash-donut{display:flex;align-items:center;justify-content:center;position:relative}
/* Mobile dashboard */
.db-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.db-kpi{padding:12px 8px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.db-kpi:active{background:var(--bg3)}
.db-kpi-val{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
.db-inbox-banner{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--accent-bg);border:1px solid rgba(124,106,247,0.25);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.db-inbox-banner:active{opacity:0.8}

/* --- Docs --- */
.docs-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.doc-card{padding:16px;cursor:pointer}
.doc-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.doc-card-icon{font-size:28px;margin-bottom:10px}
.doc-card-title{font-weight:600;font-size:14px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-editor{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.doc-editor-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.doc-editor-title{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:20px;font-weight:700;outline:none}
.doc-editor-title::placeholder{color:var(--text3)}
.doc-toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap}
.doc-toolbar-btn{padding:5px 8px;background:none;border:none;color:var(--text3);cursor:pointer;border-radius:4px;font-size:13px;transition:var(--transition);font-family:inherit;display:flex;align-items:center}
.doc-toolbar-btn:hover{background:var(--bg3);color:var(--text)}
.doc-toolbar-btn.active{background:var(--accent-bg);color:var(--accent2)}
.doc-body{padding:20px;min-height:300px;outline:none;font-size:14px;line-height:1.8;color:var(--text)}
.doc-body:empty::before{content:attr(data-placeholder);color:var(--text3)}

/* --- Goals --- */
.goals-grid{display:grid;gap:14px}
.goal-card{padding:18px}
.goal-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.goal-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.goal-title{font-weight:700;font-size:15px;margin-bottom:3px}
.goal-progress-text{font-size:13px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.goal-targets{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.goal-target{display:flex;align-items:center;gap:10px;font-size:13px}
.goal-target-bar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.goal-target-fill{height:100%;border-radius:2px}

/* --- Time tracking --- */
.time-tracker{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px}
.timer-display{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;min-width:90px}
.timer-running .timer-display{color:var(--green)}

/* --- Task detail: subtasks --- */
.subtask-item input[type=checkbox]{appearance:none;width:15px;height:15px;border:2px solid var(--border2);border-radius:50%;cursor:pointer;transition:var(--transition);flex-shrink:0}
.subtask-item input[type=checkbox]:checked{background:var(--green);border-color:var(--green)}
.subtask-name{flex:1;outline:none;border:none;background:none;color:var(--text);font-family:inherit;font-size:13px}
.subtask-name.done{text-decoration:line-through;color:var(--text3)}

/* --- Task detail: activity --- */
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.activity-content{flex:1}

/* --- Task detail: comments --- */
.comment-body{flex:1}
.comment-author{font-weight:600;font-size:13px}
.comment-text{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5}
.comment-input{display:flex;gap:8px;margin-top:10px}

/* --- Task detail: custom fields --- */
.cf-val{flex:1}

/* --- Settings --- */
.settings-wrap{display:grid;grid-template-columns:200px 1fr;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-height:400px}
.settings-nav{background:var(--bg3);border-left:1px solid var(--border);padding:12px}
.settings-nav-item{padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:var(--transition);margin-bottom:2px}
.settings-nav-item:hover{background:var(--bg4);color:var(--text)}
.settings-nav-item.active{background:var(--accent-bg);color:var(--accent2)}
.settings-content{padding:24px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:13px}

/* --- Automation --- */
.auto-rule{padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.auto-rule-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.auto-rule-body{flex:1}
.auto-rule-title{font-weight:600;font-size:13px;margin-bottom:3px}

/* --- GTD Inbox --- */
.inbox-capture{background:var(--bg2);border:2px solid var(--accent);border-radius:var(--radius);padding:14px;margin-bottom:20px;transition:var(--transition)}
.inbox-capture:focus-within{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(124,106,247,0.15)}
.inbox-capture-main{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.inbox-textarea{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:14px;resize:none;outline:none;line-height:1.5;min-height:40px}
.inbox-textarea::placeholder{color:var(--text3)}
.inbox-type-bar{display:flex;gap:4px;flex-wrap:wrap}
.inbox-type-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:var(--transition);font-family:inherit;white-space:nowrap}
.inbox-type-btn:hover{color:var(--text);border-color:var(--border2)}
.inbox-type-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.inbox-list{display:flex;flex-direction:column;gap:6px}
.inbox-item{padding:8px 10px}
.inbox-item:hover{border-color:var(--border2)}
.inbox-item.processed{opacity:0.45}
.inbox-item-row1{display:flex;align-items:baseline;gap:7px;margin-bottom:6px}
.inbox-item-type-icon{font-size:13px;flex-shrink:0;line-height:1}
.inbox-item-text{flex:1;font-size:13px;font-weight:500;line-height:1.35;color:var(--text);word-break:break-word}
.inbox-item-actions{display:flex;gap:4px;align-items:center}
.iab{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:var(--transition);white-space:nowrap;-webkit-tap-highlight-color:transparent;line-height:1}
.iab:active{transform:scale(0.94)}
.iab.task{background:rgba(34,201,122,0.12);color:var(--green)}
.iab.task:hover{background:var(--green);color:#fff}
.iab.project{background:var(--accent-bg);color:var(--accent2)}
.iab.project:hover{background:var(--accent);color:#fff}
.iab.someday{background:rgba(247,106,205,0.12);color:var(--pink)}
.iab.someday:hover{background:var(--pink);color:#fff}
.iab.ref{background:rgba(74,180,247,0.12);color:var(--blue)}
.iab.ref:hover{background:var(--blue);color:#fff}
.iab.waiting{background:rgba(247,168,74,0.12);color:var(--orange)}
.iab.waiting:hover{background:var(--orange);color:#fff}
.iab.delete{background:none;padding:3px 5px;margin-right:auto}
.iab.delete:hover{color:var(--red)}
.weekly-step{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.weekly-step:hover{border-color:var(--border2);background:var(--bg4)}
.weekly-step-num{width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.weekly-step-body{flex:1}
.weekly-step-title{font-weight:600;font-size:14px;margin-bottom:2px}

/* --- Help --- */
.help-section-icon{font-size:18px}
.help-section-title{font-weight:700;font-size:14px;flex:1}
.help-section-count{font-size:11px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:10px}
.help-items{display:flex;flex-direction:column}
.help-item{border-bottom:1px solid var(--border)}
.help-item:last-child{border-bottom:none}
.help-q{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;cursor:pointer;transition:var(--transition);user-select:none}
.help-q:hover{background:var(--bg3)}
.help-item.open .help-q{background:var(--accent-bg)}
.help-q-text{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.help-a{padding:10px 16px 14px;font-size:13px;color:var(--text2);line-height:1.65;background:var(--bg2);border-top:1px solid var(--border)}

/* ============================================================
   6. UTILITIES
   ============================================================ */

/* Colour text helpers */
.c-purple{color:var(--accent)}
.c-green{color:var(--green)}
.c-red{color:var(--red)}
.c-orange{color:var(--orange)}
.c-blue{color:var(--blue)}
.c-yellow{color:var(--yellow)}
.c-pink{color:var(--pink)}

/* Colour bg + border helpers */
.bg-purple{background:var(--accent-bg);border-color:rgba(124,106,247,0.3)}
.bg-green{background:var(--green-bg);border-color:rgba(34,201,122,0.3)}
.bg-red{background:var(--red-bg);border-color:rgba(247,106,106,0.3)}
.bg-orange{background:var(--orange-bg);border-color:rgba(247,168,74,0.3)}
.bg-blue{background:var(--blue-bg);border-color:rgba(74,180,247,0.3)}
.bg-yellow{background:var(--yellow-bg);border-color:rgba(247,226,74,0.3)}

/* Tag colour pairs */
.tag-purple{background:var(--accent-bg);color:var(--accent2)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-orange{background:var(--orange-bg);color:var(--orange)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center}
.empty-state .icon{font-size:48px;margin-bottom:14px;opacity:0.5}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:13px;max-width:300px;line-height:1.6}

/* Tooltip */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);right:50%;transform:translateX(50%);background:var(--bg4);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;z-index:200;border:1px solid var(--border)}

/* Page titles */
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.page-subtitle{font-size:13px;color:var(--text3);margin-bottom:16px}

/* ============================================================
   7. RESPONSIVE / MOBILE
   ============================================================ */

/* Bottom navigation */
#bottom-nav{display:none;position:fixed;bottom:0;right:0;left:0;height:60px;background:var(--bg2);border-top:1px solid var(--border);z-index:40;padding:0 4px;padding-bottom:env(safe-area-inset-bottom)}
#bottom-nav .bnav-items{display:flex;align-items:stretch;height:100%}

function renderSpacesNav(){
  return DB.spaces.map(sp=>{
    const folders=DB.folders.filter(f=>f.spaceId===sp.id);
    const isSpaceActive=state.space===sp.id;
    return `
      <div>
        <div class="sb-space${isSpaceActive?' active':''}" onclick="navigateSpace('${sp.id}')">
          <div class="sb-space-dot" style="background:${sp.color}"></div>
          <span class="sb-space-name">${sp.emoji||'📁'} ${sp.name}</span>
          <button class="btn-icon sb-action-btn" onclick="openSpaceMenu(event,'${sp.id}')" style="font-size:14px;opacity:0.5" title="אפשרויות">⋯</button>
        </div>
        ${folders.map(fl=>{
          const lists=DB.lists.filter(l=>l.folderId===fl.id);
          const isFolderActive=state.folder===fl.id;
          return `
            <div class="sb-item sb-item-sub${isFolderActive?' active':''}" onclick="navigateFolder('${sp.id}','${fl.id}')">
              <span class="icon">${fl.emoji||'📂'}</span>
              <span class="label">${fl.name}</span>
              <button class="btn-icon sb-action-btn" onclick="openFolderMenu(event,'${sp.id}','${fl.id}')" style="font-size:14px;opacity:0.5" title="אפשרויות">⋯</button>
            </div>
            ${lists.map(li=>`
              <div class="sb-item${state.list===li.id?' active':''}" style="padding-right:36px" onclick="navigateList('${sp.id}','${fl.id}','${li.id}')">
                <span class="icon" style="color:${li.color}">≡</span>
                <span class="label">${li.name}</span>
                <span class="count">${DB.tasks.filter(t=>t.listId===li.id&&t.status!=='הושלם').length}</span>
              </div>
            `).join('')}
          `;
        }).join('')}
      </div>
    `;
  }).join('');
}

function toggleSection(el){

  const items=el.nextElementSibling;

}

}

function navigateList(spaceId,folderId,listId){

function openSpaceMenu(e,spaceId){
  e.stopPropagation();
  const sp=DB.spaces.find(s=>s.id===spaceId);
  if(!sp) return;
  document.getElementById('ctxMenu')?.remove();
  const menu=document.createElement('div');
  menu.id='ctxMenu';
  menu.style.cssText='position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);z-index:200;min-width:170px;overflow:hidden;animation:dropIn 0.12s ease';
  menu.innerHTML=`
    <div class="dropdown-item" onclick="closeCtxMenu();editSpaceModal('${spaceId}')">✏️ ערוך מרחב</div>
    <div class="dropdown-item" onclick="closeCtxMenu();openNewFolderModal(null,'${spaceId}')">📂 תיקייה חדשה</div>
    <div class="dropdown-sep"></div>
    <div class="dropdown-item" style="color:var(--red)" onclick="closeCtxMenu();deleteSpaceById('${spaceId}')">🗑️ מחק מרחב</div>
  `;
  positionMenu(menu,e.currentTarget);
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),10);
}

function openStatusPicker(e,taskId){
  e.stopPropagation();
  document.getElementById('ctxMenu')?.remove();
  const t=DB.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const menu=document.createElement('div');
  menu.id='ctxMenu';
  menu.style.cssText='position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);z-index:200;min-width:140px;overflow:hidden;animation:dropIn 0.12s ease';
  menu.innerHTML=DB.customStatuses.map(s=>`
    <div class="dropdown-item${t.status===s?' active':''}" onclick="setTaskStatus('${taskId}','${s}');closeCtxMenu()" style="display:flex;align-items:center;gap:8px">
      <span style="width:8px;height:8px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'};flex-shrink:0"></span>
      ${s}
      ${t.status===s?'<span style="margin-right:auto;color:var(--accent2)">✓</span>':''}
    </div>
  `).join('');
  positionMenu(menu,e.currentTarget);
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),10);
}

function setTaskStatus(id,status){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  t.status=status;
  if(status==='הושלם'&&t.recurrence&&t.due){
    const next=calcNextDate(t.due,t.recurrence);
    if(next){
      const copy=JSON.parse(JSON.stringify(t));
      copy.id=uid();copy.status='לביצוע';copy.due=next;
      copy.subtasks=(t.subtasks||[]).map(s=>({...s,done:false}));
      copy.comments=[];copy.timeSpent=0;
      DB.tasks.push(copy);
      showToast(`משימה חוזרת נוצרה: ${formatDate(next)} 🔄`);
    }
  }
  saveDB();renderContent();
}
function positionMenu(menu,btn){
  const rect=btn.getBoundingClientRect();
  menu.style.top=(rect.bottom+4)+'px';
  menu.style.right=Math.max(4,window.innerWidth-rect.right)+'px';
}

function pickColor(el,inputId,color){
  document.querySelectorAll(`[data-color]`).forEach(d=>d.style.border='3px solid transparent');

function deleteSpace(e,id){
  e.stopPropagation();
  const sp=DB.spaces.find(s=>s.id===id);
  if(!sp) return;
  const folderIds=DB.folders.filter(f=>f.spaceId===id).map(f=>f.id);
  const listIds=DB.lists.filter(l=>folderIds.includes(l.folderId)).map(l=>l.id);
  const taskCount=DB.tasks.filter(t=>listIds.includes(t.listId)).length;
  confirmDialog(
    `למחוק את המרחב "${sp.name}"?\n${folderIds.length} תיקיות, ${listIds.length} רשימות ו-${taskCount} משימות יימחקו לצמיתות.`,
    ()=>{
      DB.tasks=DB.tasks.filter(t=>!listIds.includes(t.listId));
      DB.lists=DB.lists.filter(l=>!folderIds.includes(l.folderId));
      DB.folders=DB.folders.filter(f=>f.spaceId!==id);
      DB.spaces=DB.spaces.filter(s=>s.id!==id);
      if(state.space===id){state.view='dashboard';state.space=null;state.folder=null;state.list=null;}
      saveDB();renderAll();showToast('מרחב נמחק');
    },
    'מחק מרחב'
  );
}

function deleteFolder(e,id){
  e.stopPropagation();
  const fl=DB.folders.find(f=>f.id===id);
  if(!fl) return;
  const listIds=DB.lists.filter(l=>l.folderId===id).map(l=>l.id);
  const taskCount=DB.tasks.filter(t=>listIds.includes(t.listId)).length;
  confirmDialog(
    `למחוק את התיקייה "${fl.name}"?\n${listIds.length} רשימות ו-${taskCount} משימות יימחקו לצמיתות.`,
    ()=>{
      DB.tasks=DB.tasks.filter(t=>!listIds.includes(t.listId));
      DB.lists=DB.lists.filter(l=>l.folderId!==id);
      DB.folders=DB.folders.filter(f=>f.id!==id);
      if(state.folder===id){state.view='space';state.folder=null;state.list=null;}
      saveDB();renderAll();showToast('תיקייה נמחקה');
    },
    'מחק תיקייה'
  );
}

function toggleSidebar(){
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    const sb=document.getElementById('sidebar');
    const ov=document.getElementById('sidebar-overlay');
    const isOpen=!sb.classList.contains('collapsed');
    sb.classList.toggle('collapsed',isOpen);
    if(ov) ov.style.display=isOpen?'none':'block';
  } else {
    state.sidebarOpen=!state.sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed',!state.sidebarOpen);
  }
}
function closeSidebarMobile(){
  document.getElementById('sidebar').classList.add('collapsed');
  const ov=document.getElementById('sidebar-overlay');
  if(ov) ov.style.display='none';
}

  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));

function renderHeader(){

  const ha=document.getElementById('headerActions');
  let crumbs='';
  let actions='';

  if(state.view==='dashboard'){crumbs='<span class="current">לוח בקרה</span>';}
  else if(state.view==='my-tasks'){crumbs='<span class="current">משימות לטיפול 📋</span>';}
  else if(state.view==='goals'){crumbs='<span class="current">יעדים</span>';actions=`<button class="btn btn-primary btn-sm" onclick="openNewGoalModal()">+ יעד חדש</button>`;}
  else if(state.view==='docs'){crumbs='<span class="current">מסמכים</span>';actions=`<button class="btn btn-primary btn-sm" onclick="openNewDocModal()">+ מסמך חדש</button>`;}
  else if(state.view==='automations'){crumbs='<span class="current">אוטומציות</span>';actions=`<button class="btn btn-primary btn-sm" onclick="openNewAutoModal()">+ אוטומציה חדשה</button>`;}
  else if(state.view==='time'){crumbs='<span class="current">מעקב זמן</span>';}
  else if(state.view==='settings'){crumbs='<span class="current">הגדרות</span>';}
  else if(state.view==='inbox'){crumbs='<span class="current">📥 אינבוקס GTD</span>';actions=`<button class="btn btn-primary btn-sm" onclick="startWeeklyReview()">🔄 סקירה שבועית</button>`;}
  else if(state.view==='help'){crumbs='<span class="current">❓ מדריך שימוש</span>';}
  else if(state.view==='space'&&state.space){
    const sp=DB.spaces.find(s=>s.id===state.space);
    crumbs=`<span class="current">${sp?sp.name:''}</span>`;
    actions=`<button class="btn btn-primary btn-sm" onclick="openNewFolderModal(null,'${state.space}')">+ תיקייה</button>`;
  }
  else if(state.view==='folder'&&state.folder){
    const sp=DB.spaces.find(s=>s.id===state.space);

    crumbs=`<span class="crumb" onclick="navigateSpace('${state.space}')">${sp?sp.name:''}</span><span class="sep">›</span><span class="current">${fl?fl.name:''}</span>`;
    actions=`<button class="btn btn-primary btn-sm" onclick="openNewListModal(null,'${state.space}','${state.folder}')">+ רשימה</button>`;
  }
  else if(state.view==='list-view'&&state.list){
    const sp=DB.spaces.find(s=>s.id===state.space);
    const fl=DB.folders.find(f=>f.id===state.folder);
    const li=DB.lists.find(l=>l.id===state.list);
    crumbs=`<span class="crumb" onclick="navigateSpace('${state.space}')">${sp?sp.name:''}</span><span class="sep">›</span><span class="crumb" onclick="navigateFolder('${state.space}','${state.folder}')">${fl?fl.name:''}</span><span class="sep">›</span><span class="current">${li?li.name:''}</span>`;
    actions=`
      <div class="view-tabs">

function renderContent(){
  const c=document.getElementById('content');
  switch(state.view){
    case 'dashboard': c.innerHTML=renderDashboard();break;
    case 'my-tasks': c.innerHTML=renderMyTasks();break;
    case 'space': c.innerHTML=renderSpaceView();break;
    case 'folder': c.innerHTML=renderFolderView();break;
    case 'list-view': c.innerHTML=renderListView();break;
    case 'goals': c.innerHTML=renderGoals();break;
    case 'docs': c.innerHTML=renderDocs();break;
    case 'automations': c.innerHTML=renderAutomations();break;
    case 'time': c.innerHTML=renderTime();break;
    case 'settings': c.innerHTML=renderSettings();break;
    case 'inbox': c.innerHTML=renderInbox();break;
    case 'someday': c.innerHTML=renderSomeday();break;
    case 'help': c.innerHTML=renderHelp();break;
    default: c.innerHTML=renderDashboard();
  }
  bindEvents();
}


// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(){
  const allTasks=DB.tasks;
  const done=allTasks.filter(t=>t.status==='הושלם').length;
  const inProgress=allTasks.filter(t=>t.status==='בביצוע').length;
  const overdue=allTasks.filter(t=>t.due&&new Date(t.due)<new Date()&&t.status!=='הושלם').length;
  const today=new Date().toISOString().slice(0,10);
  const todayTasks=allTasks.filter(t=>t.due===today&&t.status!=='הושלם');
  const recentTasks=allTasks.slice(-5).reverse();
  const totalTime=DB.tasks.reduce((a,t)=>a+(t.timeSpent||0),0);
  const inboxPending=(DB.inbox||[]).filter(i=>!i.processed).length;
  const pct=allTasks.length?Math.round(done/allTasks.length*100):0;
  const statusCounts=DB.customStatuses.map(s=>({name:s,count:allTasks.filter(t=>t.status===s).length}));
  if(window.innerWidth<=768) return renderDashboardMobile({allTasks,done,inProgress,overdue,todayTasks,recentTasks,totalTime,inboxPending,pct,statusCounts});
  return renderDashboardDesktop({allTasks,done,inProgress,overdue,todayTasks,recentTasks,totalTime,inboxPending,pct,statusCounts});
}

function renderDashboardMobile({allTasks,done,inProgress,overdue,todayTasks,recentTasks,totalTime,inboxPending,pct,statusCounts}){
  const todayStr=new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
  return `
    <div style="font-size:13px;color:var(--text3);margin-bottom:12px">${todayStr}</div>
    <div class="db-kpi-row">
      <div class="db-kpi" onclick="navigate('my-tasks')">
        <div class="db-kpi-val" style="color:var(--green)">${done}</div>
        <div class="db-kpi-label">הושלמו</div>
      </div>
      <div class="db-kpi" onclick="navigate('my-tasks')">
        <div class="db-kpi-val" style="color:var(--accent)">${inProgress}</div>
        <div class="db-kpi-label">בביצוע</div>
      </div>
      <div class="db-kpi" onclick="navigate('my-tasks')">
        <div class="db-kpi-val" style="color:${overdue?'var(--red)':'var(--text3)'}">${overdue}</div>
        <div class="db-kpi-label">באיחור</div>
      </div>
      <div class="db-kpi" onclick="navigate('time')">
        <div class="db-kpi-val" style="color:var(--blue)">${Math.floor(totalTime/60)}</div>
        <div class="db-kpi-label">שעות</div>
      </div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
        <span style="color:var(--text2);font-weight:600">התקדמות כוללת</span>
        <span style="color:var(--green);font-weight:700">${pct}%</span>
      </div>
      <div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">

// ============================================================
// MY TASKS
// ============================================================
function renderMyTasks(){
  const today=new Date().toISOString().slice(0,10);
  let tasks=DB.tasks.filter(t=>
    t.status!=='הושלם' &&
    t.due &&
    (t.due<=today)
  );

  // apply filters
  if(state.myFilterStatus.length)
    tasks=tasks.filter(t=>state.myFilterStatus.includes(t.status));
  if(state.myFilterPriority.length)
    tasks=tasks.filter(t=>state.myFilterPriority.includes(t.priority));
  const now=new Date();
  if(state.myFilterDue==='today')
    tasks=tasks.filter(t=>t.due===today);
  else if(state.myFilterDue==='week'){
    const week=new Date();week.setDate(week.getDate()+7);
    tasks=tasks.filter(t=>t.due&&new Date(t.due)<=week&&t.status!=='הושלם');
  } else if(state.myFilterDue==='overdue')
    tasks=tasks.filter(t=>t.due&&new Date(t.due)<now&&t.status!=='הושלם');
  else if(state.myFilterDue==='nodate')
    tasks=tasks.filter(t=>!t.due);

  // sort
  const PRIO_ORDER={'דחופה':0,'גבוהה':1,'בינונית':2,'נמוכה':3,'ללא':4};
  if(state.mySort==='priority')
    tasks=[...tasks].sort((a,b)=>(PRIO_ORDER[a.priority]||4)-(PRIO_ORDER[b.priority]||4));
  else if(state.mySort==='due')
    tasks=[...tasks].sort((a,b)=>{
      if(!a.due&&!b.due) return 0;
      if(!a.due) return 1;
      if(!b.due) return -1;
      return new Date(a.due)-new Date(b.due);
    });
  else if(state.mySort==='status')
    tasks=[...tasks].sort((a,b)=>DB.customStatuses.indexOf(a.status)-DB.customStatuses.indexOf(b.status));
  else if(state.mySort==='name')
    tasks=[...tasks].sort((a,b)=>a.name.localeCompare(b.name,'he'));
  else if(state.mySort==='created')
    tasks=[...tasks].sort((a,b)=>new Date(b.created)-new Date(a.created));

  const allMyTasks=DB.tasks.filter(t=>t.assignee===DB.user.avatar);
  const statuses=[...new Set(allMyTasks.map(t=>t.status))];
  const priorities=[...new Set(allMyTasks.map(t=>t.priority))];
  const hasFilters=state.myFilterStatus.length||state.myFilterPriority.length||state.myFilterDue!=='all';

  // group for display (when no status filter, group by status; else flat)
  const useGroups=!state.myFilterStatus.length&&state.mySort==='priority';

  const filterOpen=state.myFilterOpen||false;
  const activeFiltersCount=(state.myFilterStatus.length)+(state.myFilterPriority.length)+(state.myFilterDue!=='all'?1:0)+(state.mySort!=='priority'?1:0);

  return `
    <!-- HEADER ROW -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div class="page-title" style="margin-bottom:0;flex:1">משימות לטיפול 📋</div>
      <span style="font-size:12px;color:var(--text3)">${tasks.length}</span>
      <button class="btn btn-ghost btn-sm" onclick="state.myFilterOpen=!state.myFilterOpen;renderContent()" style="${activeFiltersCount?'border-color:var(--accent);color:var(--accent2)':''}">
        ⚙️ סינון${activeFiltersCount?' ('+activeFiltersCount+')':''}
      </button>
      ${hasFilters?`<button class="btn btn-ghost btn-sm" onclick="clearMyFilters()">✕</button>`:''}
    </div>

    <!-- ACTIVE FILTER BADGES (always visible when filters active) -->
    ${hasFilters?`
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
        ${state.myFilterStatus.map(s=>`
          <span class="filter-chip active" onclick="toggleMyFilter('status','${s}')">
            <span style="width:6px;height:6px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'};display:inline-block"></span>
            ${s} ✕
          </span>`).join('')}
        ${state.myFilterPriority.map(p=>`
          <span class="filter-chip active" onclick="toggleMyFilter('priority','${p}')">${PRIORITY_ICONS[p]||''} ${p} ✕</span>`).join('')}
        ${state.myFilterDue!=='all'?`<span class="filter-chip active" onclick="setMyDueFilter('all')">${{today:'היום',week:'השבוע',overdue:'⚠️ באיחור',nodate:'ללא תאריך'}[state.myFilterDue]} ✕</span>`:''}
        ${state.mySort!=='priority'?`<span class="filter-chip active" onclick="setMySort('priority')">↕ ${state.mySort==='due'?'תאריך':state.mySort==='status'?'סטטוס':state.mySort==='name'?'שם':'נוצר'} ✕</span>`:''}
      </div>
    `:''}

    <!-- COLLAPSIBLE FILTER PANEL -->
    ${filterOpen?`
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px">

        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">סטטוס</span>
          ${statuses.map(s=>`
            <button class="filter-chip${state.myFilterStatus.includes(s)?' active':''}" style="padding:3px 8px;font-size:11px" onclick="toggleMyFilter('status','${s}')">
              <span style="width:6px;height:6px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'};display:inline-block"></span> ${s}
            </button>`).join('')}
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">עדיפות</span>
          ${['דחופה','גבוהה','בינונית','נמוכה','ללא'].filter(p=>priorities.includes(p)).map(p=>`
            <button class="filter-chip${state.myFilterPriority.includes(p)?' active':''}" style="padding:3px 8px;font-size:11px" onclick="toggleMyFilter('priority','${p}')">${PRIORITY_ICONS[p]||''} ${p}</button>`).join('')}
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">יעד</span>
          ${[{val:'all',label:'הכל'},{val:'today',label:'היום'},{val:'week',label:'השבוע'},{val:'overdue',label:'⚠️ באיחור'}].map(o=>`
            <button class="filter-chip${state.myFilterDue===o.val?' active':''}" style="padding:3px 8px;font-size:11px" onclick="setMyDueFilter('${o.val}')">${o.label}</button>`).join('')}
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">מיין</span>
          ${[{val:'priority',label:'עדיפות'},{val:'due',label:'תאריך'},{val:'status',label:'סטטוס'},{val:'name',label:'שם'},{val:'created',label:'נוצר'}].map(o=>`
            <button class="filter-chip${state.mySort===o.val?' active':''}" style="padding:3px 8px;font-size:11px" onclick="setMySort('${o.val}')">${o.label}</button>`).join('')}
        </div>
      </div>
    `:''}

    <!-- TASK LIST -->
    <div class="list-view">
      ${useGroups ? renderMyTaskGroups(tasks) : renderMyTaskFlat(tasks)}
      ${!tasks.length?`<div class="empty-state"><div class="icon">✅</div><h3>אין משימות</h3><p>${hasFilters?'לא נמצאו משימות עם הפילטרים הנוכחיים':'כל המשימות הושלמו!'}</p></div>`:''}
    </div>
  `;
}

function renderMyTaskGroups(tasks){
  const groups=[
    {name:'דחוף',color:'#f76a6a',tasks:tasks.filter(t=>t.priority==='דחופה'&&t.status!=='הושלם')},
    {name:'בביצוע',color:'#7c6af7',tasks:tasks.filter(t=>t.status==='בביצוע'&&t.priority!=='דחופה')},
    {name:'לביצוע',color:'#606078',tasks:tasks.filter(t=>t.status==='לביצוע'&&t.priority!=='דחופה')},
    {name:'ממתין',color:'#f7a84a',tasks:tasks.filter(t=>t.status==='ממתין'&&t.priority!=='דחופה')},
    {name:'הושלם',color:'#22c97a',tasks:tasks.filter(t=>t.status==='הושלם')},
  ];
  return groups.filter(g=>g.tasks.length).map(g=>renderGroup(g,true)).join('');
}

function renderMyTaskFlat(tasks){
  if(!tasks.length) return '';
  const g={name:`${tasks.length} משימות`,color:'#7c6af7',tasks};
  return renderGroup(g,true);
}

function toggleMyFilter(type,val){
  const arr=type==='status'?state.myFilterStatus:state.myFilterPriority;
  const i=arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  renderContent();
}
function setMyDueFilter(val){state.myFilterDue=val;renderContent();}
function setMySort(val){state.mySort=val;renderContent();}
function clearMyFilters(){
  state.myFilterStatus=[];state.myFilterPriority=[];
  state.myFilterDue='all';state.mySort='priority';
  renderContent();
}

function renderTasksSection(tasks,title){
  const groups=[
    {name:'דחוף',color:'#f76a6a',tasks:tasks.filter(t=>t.priority==='דחופה'&&t.status!=='הושלם')},
    {name:'בביצוע',color:'#7c6af7',tasks:tasks.filter(t=>t.status==='בביצוע'&&t.priority!=='דחופה')},
    {name:'לביצוע',color:'#606078',tasks:tasks.filter(t=>t.status==='לביצוע'&&t.priority!=='דחופה')},
    {name:'הושלם',color:'#22c97a',tasks:tasks.filter(t=>t.status==='הושלם')}
  ];
  return `
    <div class="page-title">${title}</div>
    <div class="list-view">
      ${groups.filter(g=>g.tasks.length).map(g=>renderGroup(g,true)).join('')}
      ${!tasks.length?'<div class="empty-state"><div class="icon">✅</div><h3>אין משימות</h3><p>כל המשימות הושלמו!</p></div>':''}
    </div>
  `;
}

function renderSpaceView(){
  const sp=DB.spaces.find(s=>s.id===state.space);
  if(!sp) return '';
  const folders=DB.folders.filter(f=>f.spaceId===sp.id);
  return `
    <div class="page-title">${sp.emoji||'📁'} ${sp.name}</div>
    <div class="page-subtitle">מרחב עבודה</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:8px">
      ${folders.map(fl=>{
        const lists=DB.lists.filter(l=>l.folderId===fl.id);
        const tasks=DB.tasks.filter(t=>lists.some(l=>l.id===t.listId));
        const done=tasks.filter(t=>t.status==='הושלם').length;
        return `
          <div class="dash-card" onclick="navigateFolder('${sp.id}','${fl.id}')" style="cursor:pointer">
            <div class="dash-card-title">📂 ${fl.name}</div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${lists.length} רשימות · ${tasks.length} משימות</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${tasks.length?Math.round(done/tasks.length*100):0}%;background:${sp.color}"></div></div>
            <div style="font-size:12px;color:var(--text3);margin-top:4px">${tasks.length?Math.round(done/tasks.length*100):0}% הושלם</div>
          </div>

function toggleGroup(el){
  const body=el.nextElementSibling;
  const arrow=el.querySelector('.list-group-arrow');
  if(body.style.display==='none'){body.style.display='block';arrow.classList.add('open');}
  else{body.style.display='none';arrow.classList.remove('open');}
}

function activateQuickAdd(groupId,statusName){
  const trigger=document.querySelector(`#${groupId}_qa .quick-add-trigger`);
  const form=document.getElementById(`${groupId}_form`);
  const input=document.getElementById(`${groupId}_input`);
  if(!trigger||!form||!input) return;
  trigger.style.display='none';
  form.style.display='flex';
  input.focus();
}

function deactivateQuickAdd(groupId){
  const trigger=document.querySelector(`#${groupId}_qa .quick-add-trigger`);
  const form=document.getElementById(`${groupId}_form`);
  const input=document.getElementById(`${groupId}_input`);
  if(!trigger||!form||!input) return;
  // small delay to allow save button click to fire first
  setTimeout(()=>{
    if(document.activeElement!==input){
      form.style.display='none';
      trigger.style.display='flex';
      input.value='';
    }
  },150);
}

function quickAddKeydown(e,groupId,statusName){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();quickAddSave(groupId,statusName);}
  if(e.key==='Escape'){deactivateQuickAdd(groupId);document.getElementById(`${groupId}_input`).value='';}
}

function quickAddSave(groupId,statusName){
  const input=document.getElementById(`${groupId}_input`);
  const name=input?.value?.trim();
  if(!name) return;
  const task={
    id:uid(),
    listId:state.list||DB.lists[0]?.id,
    name,desc:'',
    status:statusName||DB.customStatuses[0]||'לביצוע',
    priority:'בינונית',
    due:'',assignee:DB.user.avatar,tags:[],
    created:new Date().toISOString().slice(0,10),
    timeSpent:0,subtasks:[],customFields:{},comments:[],activity:[]
  };
  DB.tasks.push(task);
  saveDB();
  input.value='';
  // re-render content but keep focus in a new quick-add row for the same group
  renderContent();
  // re-activate after render
  setTimeout(()=>activateQuickAdd(groupId,statusName),30);
}

// ============================================================
// CALENDAR VIEW
// ============================================================
function renderCalendarView(tasks){
  const year=state.calYear,month=state.calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const monthNames=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const dayNames=['א','ב','ג','ד','ה','ו','ש'];

  let cells='';
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const day=i-firstDay+1;
    const isCurrentMonth=day>0&&day<=daysInMonth;
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=isCurrentMonth&&today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
    const dayTasks=isCurrentMonth?tasks.filter(t=>t.due===dateStr):[];
    const maxShow=3;
    cells+=`
      <div class="cal-cell${!isCurrentMonth?' other-month':''}${isToday?' today':''}">
        <div class="cal-date">${isCurrentMonth?day:''}</div>
        ${dayTasks.slice(0,maxShow).map(t=>`
          <div class="cal-task" style="background:${STATUS_COLORS[t.status]||'#606078'}33;color:${STATUS_COLORS[t.status]||'#606078'}" onclick="openTask('${t.id}')">${t.name}</div>
        `).join('')}
        ${dayTasks.length>maxShow?`<div class="cal-more">+${dayTasks.length-maxShow} עוד</div>`:''}
      </div>
    `;
  }

  return `
    <div class="calendar-view">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">‹</button>
          <button class="btn btn-ghost btn-sm" onclick="calNav(1)">›</button>
        </div>
        <div class="cal-title">${monthNames[month]} ${year}</div>
        <button class="btn btn-ghost btn-sm" onclick="calToday()">היום</button>
      </div>
      <div class="cal-grid">
        ${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function calNav(dir){state.calMonth+=dir;if(state.calMonth>11){state.calMonth=0;state.calYear++;}if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderContent();}
function calToday(){state.calMonth=new Date().getMonth();state.calYear=new Date().getFullYear();renderContent();}

// ============================================================
// GANTT VIEW
// ============================================================
function renderGanttView(tasks){
  const today=new Date();
  const startDate=new Date(today);startDate.setDate(today.getDate()-7);
  const days=30;
  const DAY_W=36;

  const headers=[];
  for(let i=0;i<days;i++){
    const d=new Date(startDate);d.setDate(startDate.getDate()+i);
    headers.push({date:d,label:`${d.getDate()}/${d.getMonth()+1}`});
  }

  const todayOffset=Math.floor((today-startDate)/(1000*60*60*24));

  const tasksWithDates=tasks.filter(t=>t.due);

  return `
    <div class="gantt-view">
      <div class="gantt-wrap">
        <div class="gantt-left">
          <div class="gantt-header">שם המשימה</div>
          ${tasksWithDates.map(t=>`
            <div class="gantt-row" onclick="openTask('${t.id}')">
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px">${t.name}</span>
            </div>
          `).join('')}
        </div>
        <div class="gantt-right" style="overflow-x:auto">
          <div class="gantt-timeline-header" style="width:${days*DAY_W}px;position:relative">
            ${headers.map((h,i)=>`<div class="gantt-day-label" style="right:${i*DAY_W}px;width:${DAY_W}px;${h.date.getDay()===0||h.date.getDay()===6?'color:var(--text3)':''}">${h.label}</div>`).join('')}
          </div>
          <div style="position:relative;width:${days*DAY_W}px">
            <div class="gantt-today-line" style="right:${todayOffset*DAY_W}px"></div>
            ${tasksWithDates.map(t=>{
              const dueD=new Date(t.due);
              const startD=t.startDate?new Date(t.startDate):new Date(dueD);startD.setDate(dueD.getDate()-3);
              const startOffset=Math.floor((startD-startDate)/(1000*60*60*24));
              const endOffset=Math.floor((dueD-startDate)/(1000*60*60*24));
              const width=Math.max(1,endOffset-startOffset)*DAY_W;
              const left=Math.max(0,startOffset)*DAY_W;
              const color=STATUS_COLORS[t.status]||'#7c6af7';
              return `
                <div class="gantt-timeline-row" style="width:${days*DAY_W}px">
                  ${startOffset<days&&endOffset>0?`<div class="gantt-bar" style="right:${left}px;width:${width}px;background:${color};right:${left}px" onclick="openTask('${t.id}')">${t.name}</div>`:''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

// TIME TRACKING
// ============================================================
function renderTime(){
  const entries=DB.timeEntries||[];
  const today=new Date().toISOString().slice(0,10);
  const todayEntries=entries.filter(e=>e.date===today);
  const todayMin=todayEntries.reduce((a,e)=>a+e.minutes,0);
  const weekEntries=entries.slice(-20);

  return `
    <div class="page-title">מעקב זמן ⏱️</div>

    <div class="time-tracker${state.timerRunning?' timer-running':''}" style="margin-bottom:16px">
      <div style="flex:1">
        <div style="font-size:12px;color:var(--text3);margin-bottom:4px">טיימר פעיל</div>
        <div class="timer-display" id="timerDisplay">${formatTimer(state.timerSeconds)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <select class="form-input" id="timerTaskSel" style="width:180px">
          <option value="">בחר משימה...</option>
          ${DB.tasks.map(t=>`<option value="${t.id}" ${state.timerTask===t.id?'selected':''}>${t.name}</option>`).join('')}
        </select>
        ${state.timerRunning
          ?`<button class="btn btn-danger btn-sm" onclick="stopTimer()">⏹ עצור</button>`
          :`<button class="btn btn-primary btn-sm" onclick="startTimer()">▶ התחל</button>`
        }
      </div>
    </div>

    <div class="dash-card" style="margin-bottom:16px">
      <div class="dash-card-title">היום — ${Math.floor(todayMin/60)}:${String(todayMin%60).padStart(2,'0')} שעות</div>
      ${todayEntries.map(e=>`
        <div class="time-log-row">
          <span style="flex:1">${getTaskName(e.taskId)||'כללי'}</span>
          <span style="color:var(--text3)">${e.minutes} דקות</span>
          <span style="color:var(--text3);font-size:11px">${e.startTime}</span>
        </div>
      `).join('')}
      ${!todayEntries.length?`<div style="color:var(--text3);font-size:13px;padding:8px 0">אין רשומות להיום</div>`:''}
    </div>

    <div class="dash-card">
      <div class="dash-card-title">היסטוריה אחרונה</div>
      ${weekEntries.reverse().map(e=>`
        <div class="time-log-row">
          <span style="flex:1">${getTaskName(e.taskId)||'כללי'}</span>
          <span style="color:var(--accent)">${e.minutes} דקות</span>
          <span style="color:var(--text3);font-size:11px">${e.date} ${e.startTime}</span>
          <button class="btn-icon" onclick="deleteTimeEntry('${e.id}')">✕</button>
        </div>
      `).join('')}
      ${!weekEntries.length?`<div style="color:var(--text3);font-size:13px;padding:8px 0">אין היסטוריית זמן</div>`:''}
    </div>
  `;
}

function fabAction(){
  if(state.view==='inbox'){
    const inp=document.getElementById('inboxInput');
    if(inp){inp.focus();inp.scrollIntoView({behavior:'smooth'});}
    else{navigate('inbox');setTimeout(()=>document.getElementById('inboxInput')?.focus(),150);}
  } else {
    openNewTaskModal();
  }
}

function startTimer(){
  state.timerTask=sel?sel.value:'';
  state.timerRunning=true;state.timerStart=Date.now();state.timerSeconds=0;
  state.timerInterval=setInterval(()=>{
    state.timerSeconds=Math.floor((Date.now()-state.timerStart)/1000);
    const el=document.getElementById('timerDisplay');
    if(el) el.textContent=formatTimer(state.timerSeconds);
  },1000);
  renderContent();
}
function stopTimer(){
  clearInterval(state.timerInterval);
  const minutes=Math.floor(state.timerSeconds/60)||1;
  const entry={id:uid(),taskId:state.timerTask,minutes,date:new Date().toISOString().slice(0,10),startTime:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})};
  if(!DB.timeEntries) DB.timeEntries=[];
  DB.timeEntries.push(entry);
  if(state.timerTask){const t=DB.tasks.find(x=>x.id===state.timerTask);if(t) t.timeSpent=(t.timeSpent||0)+minutes;}
  state.timerRunning=false;state.timerSeconds=0;state.timerTask=null;
  saveDB();renderContent();showToast(`זמן הוקלט: ${minutes} דקות ✓`);
}
function deleteTimeEntry(id){DB.timeEntries=DB.timeEntries.filter(e=>e.id!==id);saveDB();renderContent();}
function formatTimer(s){return`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
