<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מנהל משימות">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>מנהל משימות מתקדם</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TASK MANAGER — STYLESHEET
   ============================================================ */
:root {
  --bg:  #0f0f13;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --bg4: #262633;
  --border:  #2e2e3e;
  --border2: #3a3a4e;
  --text:  #e8e8f0;
  --text2: #a0a0b8;
  --text3: #606078;
  --accent:    #7c6af7;
  --accent2:   #9d8fff;
  --accent-bg: rgba(124,106,247,0.12);
  --green:  #22c97a;  --green-bg:  rgba(34,201,122,0.12);
  --red:    #f76a6a;  --red-bg:    rgba(247,106,106,0.12);
  --orange: #f7a84a;  --orange-bg: rgba(247,168,74,0.12);
  --blue:   #4ab4f7;  --blue-bg:   rgba(74,180,247,0.12);
  --yellow: #f7e24a;  --yellow-bg: rgba(247,226,74,0.12);
  --pink:   #f76acd;  --pink-bg:   rgba(247,106,205,0.12);
  --sidebar-w: 260px;
  --header-h:  56px;
  --radius:    10px;
  --radius-sm: 6px;
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
@keyframes modalIn{from{opacity:0;transform:translateY(-16px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#app{display:flex;height:100vh;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#content{flex:1;overflow:auto;padding:20px}
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:var(--transition);z-index:10}
#sidebar.collapsed{width:0;min-width:0}
.sb-top{padding:12px;border-bottom:1px solid var(--border)}
.sb-bottom{padding:12px;border-top:1px solid var(--border)}
.sb-nav{flex:1;overflow-y:auto;padding:8px}
.sb-logo{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.sb-logo:hover{background:var(--bg3)}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--pink));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-logo-text{font-weight:800;font-size:16px;letter-spacing:-0.5px}
.sb-logo-sub{font-size:11px;color:var(--text3)}
.sb-search{padding:8px 12px}
.sb-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:var(--transition)}
.sb-search input:focus{border-color:var(--accent);background:var(--bg4)}
.sb-search input::placeholder{color:var(--text3)}
.sb-section{margin-bottom:4px}
.sb-section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text3);font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition);user-select:none}
.sb-section-header:hover{color:var(--text2);background:var(--bg3)}
.sb-section-header .arrow{font-size:10px;transition:var(--transition)}
.sb-section-header.open .arrow{transform:rotate(90deg)}
.sb-section-items{overflow:hidden;max-height:0;transition:max-height 0.25s ease}
.sb-section-items.open{max-height:2000px}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;transition:var(--transition);user-select:none;position:relative}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent2)}
.sb-item .icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.sb-item .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.sb-item .count{color:var(--text3);font-size:11px}
.sb-item-sub{padding-right:20px}
.sb-space{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);user-select:none}
.sb-space:hover{background:var(--bg3)}
.sb-space-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sb-space-name{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-space-actions{display:none;gap:2px}
.sb-space:hover .sb-space-actions{display:flex}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.sb-user:hover{background:var(--bg3)}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:11px;color:var(--text3)}
#header{height:var(--header-h);min-height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:5}
.header-toggle{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:var(--radius-sm);transition:var(--transition);font-size:16px;display:flex;align-items:center}
.header-toggle:hover{background:var(--bg3);color:var(--text)}
.header-breadcrumb{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.header-breadcrumb .crumb{color:var(--text3);font-size:13px;cursor:pointer;transition:var(--transition);white-space:nowrap}
.header-breadcrumb .crumb:hover{color:var(--text)}
.header-breadcrumb .sep{color:var(--text3);font-size:11px}
.header-breadcrumb .current{color:var(--text);font-weight:600}
.header-actions{display:flex;align-items:center;gap:6px}
/* sync status indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;margin-right:4px;transition:background 0.3s}
.sync-dot.synced{background:var(--green)}
.sync-dot.pending{background:var(--orange);animation:pulse 1.5s ease-in-out infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* shared cards */
.dash-card,.doc-card,.goal-card,.auto-rule,.help-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);transition:var(--transition)}
.dash-card:hover,.doc-card:hover,.goal-card:hover,.auto-rule:hover{border-color:var(--border2)}
.list-group-header,.board-col-header,.help-section-header,.notif-header,.col-header{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.list-group-header{padding:10px 14px;background:var(--bg3);cursor:pointer;user-select:none}
.list-group-header:hover{background:var(--bg4)}
.board-col-header{padding:12px 14px}
.help-section-header{padding:12px 16px;background:var(--bg3);gap:10px}
.notif-header{padding:14px 16px;justify-content:space-between;font-weight:600}
.col-header{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text3);background:var(--bg3);text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;z-index:3}
.dash-list-item,.time-log-row,.subtask-item,.activity-item,.comment-item,.cf-item,.db-task-row{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);font-size:13px}
.dash-list-item:last-child,.time-log-row:last-child,.subtask-item:last-child,.activity-item:last-child,.comment-item:last-child,.cf-item:last-child,.db-task-row:last-child{border-bottom:none}
.dash-list-item{padding:8px 0}
.time-log-row{padding:8px 0}
.subtask-item{padding:7px 0}
.activity-item{padding:8px 0}
.comment-item{padding:10px 0;align-items:flex-start}
.cf-item{padding:8px 0}
.db-task-row{padding:10px 14px;cursor:pointer;transition:var(--transition);-webkit-tap-highlight-color:transparent}
.db-task-row:active{background:var(--bg3)}
.sb-logo-sub,.sb-user-role,.sb-item .count,.task-due,.task-subtask-count,.board-card-due,.cal-more,.gantt-day-label,.dash-stat-label,.notif-time,.activity-time,.comment-time,.cf-label,.doc-card-meta,.goal-owner,.auto-rule-desc,.weekly-step-desc,.help-q-arrow,.settings-row-desc,.inbox-item-age,.inbox-item-note,.inbox-processed-label,.db-kpi-label,.iab span{color:var(--text3)}
.task-due{font-size:11px;white-space:nowrap;flex-shrink:0}
.task-due.overdue{color:var(--red)}
.task-due.today{color:var(--orange)}
.task-subtask-count{font-size:11px;display:flex;align-items:center;gap:3px}
.board-card-due{font-size:11px}
.cal-more{font-size:11px;cursor:pointer;padding:1px 4px}
.gantt-day-label{font-size:11px;font-weight:600;text-align:center;position:absolute;top:50%;transform:translateY(-50%)}
.dash-stat-label{font-size:12px}
.notif-time{font-size:11px}
.activity-time{font-size:11px}
.comment-time{font-size:11px;margin-right:6px}
.cf-label{width:100px;flex-shrink:0}
.doc-card-meta{font-size:11px}
.goal-owner{font-size:12px}
.auto-rule-desc{font-size:12px}
.weekly-step-desc{font-size:12px}
.help-q-arrow{font-size:10px;flex-shrink:0;transition:transform 0.15s ease}
.settings-row-desc{font-size:12px;margin-top:2px}
.inbox-item-age{font-size:10px;flex-shrink:0;white-space:nowrap}
.inbox-item-note{font-size:11px;margin-bottom:5px;padding-right:20px}
.inbox-processed-label{font-size:10px;padding-top:2px}
.db-kpi-label{font-size:11px;margin-top:4px;font-weight:500}
.iab span{font-size:10px}
.modal-section-title,.inbox-section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.inbox-section-title{display:flex;align-items:center;justify-content:space-between;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.input,.form-input,.cf-input,.quick-add-input,.modal-desc,.comment-input input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:var(--transition)}
.input:focus,.form-input:focus,.cf-input:focus,.quick-add-input:focus,.modal-desc:focus,.comment-input input:focus{border-color:var(--accent)}
.input::placeholder,.form-input::placeholder,.cf-input::placeholder,.quick-add-input::placeholder,.modal-desc::placeholder,.comment-input input::placeholder{color:var(--text3)}
.input{padding:8px 12px;width:100%}
.form-input{width:100%;padding:9px 12px}
.cf-input{padding:4px 8px;width:100%;border-radius:4px}
.quick-add-input{flex:1;border-width:1.5px;border-color:var(--accent);padding:7px 12px}
.modal-desc{width:100%;padding:10px;resize:vertical;min-height:80px;line-height:1.6}
.comment-input input{flex:1;padding:8px 12px}
select.form-input option{background:var(--bg3)}
.inline-edit{background:none;border:none;border-bottom:1px solid transparent;color:var(--text);font-family:inherit;font-size:inherit;font-weight:inherit;outline:none;width:100%;transition:var(--transition);cursor:pointer}
.inline-edit:hover{border-bottom-color:var(--border2)}
.inline-edit:focus{border-bottom-color:var(--accent);cursor:text;background:var(--bg3);padding:2px 6px;border-radius:4px 4px 0 0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:var(--transition);white-space:nowrap}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(247,106,106,0.2)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-icon{padding:6px;background:transparent;border:none;color:var(--text3);cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition);font-size:15px;display:flex;align-items:center}
.btn-icon:hover{background:var(--bg3);color:var(--text)}
.view-tabs{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:var(--radius-sm)}
.view-tab{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text3);transition:var(--transition);display:flex;align-items:center;gap:5px;white-space:nowrap;border:none;background:none;font-family:inherit}
.view-tab:hover{color:var(--text2)}
.view-tab.active{background:var(--bg4);color:var(--text);box-shadow:var(--shadow-sm)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.status-badge,.priority-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.toggle{width:40px;height:22px;background:var(--bg4);border-radius:11px;cursor:pointer;position:relative;transition:var(--transition);flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;right:3px;transition:var(--transition)}
.toggle.on::after{right:21px}
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 0;flex-wrap:wrap}
.filter-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2);cursor:pointer;transition:var(--transition)}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.filter-chip .remove{color:var(--text3);margin-right:2px}
.filter-chip .remove:hover{color:var(--red)}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:modalIn 0.2s ease;position:relative}
.modal-header{display:flex;align-items:flex-start;gap:14px;padding:20px 20px 0}
.modal-title-area{flex:1}
.modal-task-name{width:100%;background:none;border:none;color:var(--text);font-family:inherit;font-size:18px;font-weight:700;outline:none;resize:none;line-height:1.3}
.modal-task-name::placeholder{color:var(--text3)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;font-size:18px;transition:var(--transition);flex-shrink:0}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{display:flex;min-height:400px}
.modal-left{flex:1;padding:16px 20px;border-left:1px solid var(--border);overflow-y:auto;min-width:0}
.modal-right{width:230px;padding:16px;overflow-y:auto}
.modal-section{margin-bottom:18px}
.modal-field{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.modal-field-label{font-size:12px;color:var(--text3);width:70px;flex-shrink:0}
.modal-field-val{flex:1;font-size:13px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:360px;box-shadow:var(--shadow);animation:modalIn 0.15s ease}
.confirm-msg{padding:20px 20px 16px;font-size:15px;font-weight:500;line-height:1.5;text-align:center;white-space:pre-wrap}
.confirm-input-wrap{padding:0 20px 16px}
.confirm-input-wrap input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;outline:none}
.confirm-input-wrap input:focus{border-color:var(--accent)}
.confirm-btns{display:flex;gap:8px;padding:0 16px 16px}
.confirm-btns .btn{flex:1;justify-content:center}
.select-wrap{position:relative;display:inline-block}
.custom-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:var(--transition)}
.custom-select:hover{border-color:var(--border2)}
.dropdown{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:50;min-width:160px;overflow:hidden;animation:dropIn 0.12s ease}
.dropdown.hidden{display:none}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;transition:var(--transition)}
.dropdown-item:hover{background:var(--bg4)}
.dropdown-item.active{color:var(--accent2)}
.dropdown-sep{height:1px;background:var(--border);margin:4px 0}
.dropdown-header{padding:6px 12px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.notif-panel{position:fixed;top:60px;left:20px;width:340px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:90;max-height:500px;overflow-y:auto;animation:dropIn 0.15s ease}
.notif-panel.hidden{display:none}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:var(--accent-bg)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.notif-text{font-size:13px;flex:1}
.col-header .col{display:flex;align-items:center;gap:4px;cursor:pointer;transition:var(--transition)}
.col-header .col:hover{color:var(--text)}
.col-header .sort-icon{font-size:10px}
.list-view{}
.list-group{margin-bottom:12px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.list-group-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.list-group-name{font-weight:600;font-size:13px;flex:1}
.list-group-count{color:var(--text3);font-size:12px}
.list-group-arrow{color:var(--text3);font-size:11px;transition:var(--transition)}
.list-group-arrow.open{transform:rotate(90deg)}
.list-group-body{overflow:hidden}
.task-row{display:flex;align-items:center;padding:0;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition);background:var(--bg2)}
.task-row:hover{background:var(--bg3)}
.task-row:last-child{border-bottom:none}
.task-row.selected{background:var(--accent-bg)}
.task-check{width:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:10px 0}

// ============================================================
// SECURITY HELPERS — escape user content (fix XSS #10-11)
// ============================================================
function escHtml(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// escape for inclusion inside JS string literal delimited by single quotes (for inline onclick="foo('${escJs(x)}')")
// FIX-5 / QUALITY-1: two passes - first JS-escape, then HTML-escape the result, so
// user-controlled strings (status names, tag names, folder names etc.) cannot
// break out of the attribute context and cause XSS.
function escJs(s){
  if(s===undefined||s===null) return '';
  const jsEscaped=String(s)
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/"/g,'\\"')
    .replace(/\n/g,'\\n')
    .replace(/\r/g,'')
    .replace(/\u2028/g,'\\u2028')
    .replace(/\u2029/g,'\\u2029')
    .replace(/</g,'\\x3C')
    .replace(/>/g,'\\x3E')
    .replace(/&/g,'\\x26');
  // second pass: HTML-escape so the result is also safe inside an attribute
  return jsEscaped.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// FIX #8: deep-merge with defaultDB so new fields always exist
function loadDB(){
  const def=defaultDB();
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      // shallow merge for top-level, preserve arrays from parsed
      const merged={...def,...parsed};
      // ensure settings are complete
      merged.settings={...def.settings,...(parsed.settings||{})};
      // ensure user object is complete
      merged.user={...def.user,...(parsed.user||{})};
      // ensure arrays exist
      ['spaces','folders','lists','tasks','docs','goals','automations','notifications','customStatuses','timeEntries','inbox','someday'].forEach(k=>{
        if(!Array.isArray(merged[k])) merged[k]=def[k];
      });
      merged.version=DB_VERSION;
      return ensureGeneralSpace(merged);
    }
  }catch(e){console.warn('DB load failed:',e);}
  return ensureGeneralSpace(def);
}

// Ensure "general" space exists (migration). Also ensure all tasks have a valid listId.
function ensureGeneralSpace(db){
  let sp=db.spaces.find(s=>s.id==='general');
  if(!sp){
    sp={id:'general',name:'כללי',color:'#a0a0b8',emoji:'📌',protected:true};
    db.spaces.unshift(sp);
  } else {
    sp.protected=true;
  }
  // ensure at least one list exists in general (no folder required)
  let list=db.lists.find(l=>l.spaceId==='general'&&!l.folderId);
  if(!list) list=db.lists.find(l=>l.spaceId==='general');
  if(!list){
    list={id:'general_list',folderId:null,spaceId:'general',name:'כללי',color:'#a0a0b8'};
    db.lists.push(list);
  }
  // any task with a listId that no longer exists → reassign to general list
  const validIds=new Set(db.lists.map(l=>l.id));
  db.tasks.forEach(t=>{
    if(!t.listId||!validIds.has(t.listId)) t.listId=list.id;
  });
  return db;
}

// Recalculate 'task_count' targets across all goals based on current tasks.
// FIX-10: this is now only called on explicit demand (saveDBFull, import, migration).
// For individual task mutations we use recalcGoalProgressFor(goalId) which is O(tasks)
// per affected goal, instead of O(goals * targets * tasks) on every save.
function recalcGoalProgress(){
  (DB.goals||[]).forEach(g=>{
    (g.targets||[]).forEach(t=>{
      if(t.type==='task_count'){
        t.current=DB.tasks.filter(tk=>tk.goalId===g.id&&tk.status==='הושלם').length;
      }
    });
  });
}
// FIX-10: targeted recalc — only rebuild targets for one specific goal.
function recalcGoalProgressFor(goalId){
  if(!goalId) return;
  const g=(DB.goals||[]).find(x=>x.id===goalId);
  if(!g) return;
  (g.targets||[]).forEach(t=>{
    if(t.type==='task_count'){
      t.current=DB.tasks.filter(tk=>tk.goalId===g.id&&tk.status==='הושלם').length;
    }
  });
}

// FIX #7: gist sync with lock to prevent concurrent writes
let _gistSyncTimer=null;
let _gistSyncing=false;
let _syncStatus='idle'; // idle|pending|synced|error
// FIX-12: backoff after consecutive sync failures. After 3 silent failures
// we stop auto-syncing and notify the user; manual sync resets the counter.
let _gistFailures=0;
const _gistMaxFailures=3;

function saveDB(){
  // FIX-10: no longer call recalcGoalProgress() on every save. Callers that
  // mutate goalId/status call recalcGoalProgressFor(goalId) themselves.
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));}catch(e){console.warn('saveDB failed:',e);}
  if(DB.gistToken&&DB.gistId&&_gistFailures<_gistMaxFailures){
    setSyncStatus('pending');
    clearTimeout(_gistSyncTimer);
    _gistSyncTimer=setTimeout(()=>syncToGistSilent(),10000);
  }
}

// Full save with full goal-recalc — used on import, migration, batch ops.
function saveDBFull(){
  recalcGoalProgress();
  saveDB();
}

function uid(){return 't'+Date.now()+Math.random().toString(36).slice(2,7)}

// FIX-6: activity entries and comments now store a real timestamp (`ts`)
// and the UI formats it relative to 'now' on each render. Old entries that
// used {time:'לפני שעה'} strings still work via displayActivityTime().
function nowTs(){return Date.now();}
function formatRelativeTime(ts){
  if(!ts) return '';
  if(typeof ts==='string') return ts; // legacy — show as-is
  const diff=Date.now()-ts;
  const sec=Math.floor(diff/1000);
  if(sec<10) return 'זה עתה';
  if(sec<60) return `לפני ${sec} שניות`;
  const min=Math.floor(sec/60);
  if(min<60) return `לפני ${min} דקות`;
  const hr=Math.floor(min/60);
  if(hr<24) return `לפני ${hr} שעות`;
  const day=Math.floor(hr/24);
  if(day<7) return `לפני ${day} ימים`;
  const wk=Math.floor(day/7);
  if(wk<5) return `לפני ${wk} שבועות`;
  const mo=Math.floor(day/30);
  if(mo<12) return `לפני ${mo} חודשים`;
  return `לפני ${Math.floor(mo/12)} שנים`;
}
// Back-compat: accept either {time:'...'} (legacy) or {ts:<number>} in records.
function displayActivityTime(entry){
  if(!entry) return '';
  if(entry.ts) return formatRelativeTime(entry.ts);
  return entry.time||'';
}

function setSyncStatus(s){
  _syncStatus=s;
  const dot=document.getElementById('syncDot');
  if(!dot) return;
  dot.classList.remove('synced','pending','error');
  if(s==='synced') dot.classList.add('synced');
  else if(s==='pending') dot.classList.add('pending');
  else if(s==='error') dot.classList.add('error');
  dot.title={idle:'',pending:'ממתין לסינכרון',synced:'סונכרן',error:'שגיאת סינכרון'}[s]||'';
}

// FIX #30: Undo system — snapshot before destructive ops
let _undoSnapshot=null;
let _undoLabel='';
let _undoTimer=null;
function takeSnapshot(label){
  _undoSnapshot=JSON.stringify(DB);
  _undoLabel=label;
  showUndoSnack(label);
}
function showUndoSnack(label){
  const el=document.getElementById('undo-snack');
  const txt=document.getElementById('undoText');
  if(!el||!txt) return;
  txt.textContent=label;
  el.classList.remove('hidden');
  clearTimeout(_undoTimer);
  _undoTimer=setTimeout(()=>el.classList.add('hidden'),8000);
}
function performUndo(){
  if(!_undoSnapshot) return;
  try{
    DB=JSON.parse(_undoSnapshot);
    localStorage.setItem(STORAGE_KEY,_undoSnapshot);
    _undoSnapshot=null;
    document.getElementById('undo-snack')?.classList.add('hidden');
    renderAll();
    showToast('בוטל ✓');
  }catch(e){showToast('שגיאה בביטול ⚠️');}
}

function setTaskStatus(id,status){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  t.status=status;
  if(status==='הושלם'&&t.recurrence&&t.due){
    // FIX-7: next occurrence is based on date of completion (today), not on t.due.
    const todayStr=new Date().toISOString().slice(0,10);
    const next=calcNextDate(todayStr,t.recurrence);
    if(next){
      const copy=JSON.parse(JSON.stringify(t));
      copy.id=uid();copy.status='לביצוע';copy.due=next;
      copy.subtasks=(t.subtasks||[]).map(s=>({...s,done:false}));
      copy.comments=[];copy.timeSpent=0;copy.activity=[];
      DB.tasks.push(copy);
      showToast(`משימה חוזרת נוצרה: ${formatDate(next)} 🔄`);
    }
  }
  // FIX-10: targeted goal recalc (only if this task is linked to a goal)
  if(t.goalId) recalcGoalProgressFor(t.goalId);
  saveDB();renderContent();
}

}

// FIX-4: scope selector to the immediate parent container of color swatches.
// Previously document.querySelectorAll('[data-color]') matched swatches in all
// open modals/forms simultaneously, causing visual bleed between pickers.
function pickColor(el,inputId,color){
  const container=el.parentElement||document;
  container.querySelectorAll('[data-color]').forEach(d=>d.style.border='3px solid transparent');
  el.style.border='3px solid #fff';
  const inp=document.getElementById(inputId);
  if(inp) inp.value=color;
}

function deleteSpace(e,id){
  e.stopPropagation();
  const sp=DB.spaces.find(s=>s.id===id);
  if(!sp) return;
  if(sp.protected){showToast('מרחב "כללי" מוגן ממחיקה ⚠️');return;}
  const folderIds=DB.folders.filter(f=>f.spaceId===id).map(f=>f.id);
  // include BOTH lists inside folders of this space AND direct-in-space lists
  const listIds=DB.lists.filter(l=>l.spaceId===id||folderIds.includes(l.folderId)).map(l=>l.id);
  const taskCount=DB.tasks.filter(t=>listIds.includes(t.listId)).length;
  confirmDialog(
    `למחוק את המרחב "${sp.name}"?\n${folderIds.length} תיקיות, ${listIds.length} רשימות ו-${taskCount} משימות יימחקו לצמיתות.`,
    ()=>{
      takeSnapshot(`נמחק מרחב "${sp.name}"`);
      DB.tasks=DB.tasks.filter(t=>!listIds.includes(t.listId));
      DB.lists=DB.lists.filter(l=>!listIds.includes(l.id));
      DB.folders=DB.folders.filter(f=>f.spaceId!==id);
      DB.spaces=DB.spaces.filter(s=>s.id!==id);
      if(state.space===id){state.view='dashboard';state.space=null;state.folder=null;state.list=null;}
      saveDB();renderAll();showToast('מרחב נמחק');
    },
    'מחק מרחב'
  );
}

function deleteFolder(e,id){
  e.stopPropagation();
  const fl=DB.folders.find(f=>f.id===id);
  if(!fl) return;
  const listIds=DB.lists.filter(l=>l.folderId===id).map(l=>l.id);
  const taskCount=DB.tasks.filter(t=>listIds.includes(t.listId)).length;
  confirmDialog(
    `למחוק את התיקייה "${fl.name}"?\n${listIds.length} רשימות ו-${taskCount} משימות יימחקו לצמיתות.`,
    ()=>{
      takeSnapshot(`נמחקה תיקייה "${fl.name}"`);
      DB.tasks=DB.tasks.filter(t=>!listIds.includes(t.listId));
      DB.lists=DB.lists.filter(l=>l.folderId!==id);
      DB.folders=DB.folders.filter(f=>f.id!==id);
      if(state.folder===id){state.view='space';state.folder=null;state.list=null;}
      saveDB();renderAll();showToast('תיקייה נמחקה');
    },
    'מחק תיקייה'
  );
}

function renderContent(){
  const c=document.getElementById('content');
  switch(state.view){
    case 'dashboard': c.innerHTML=renderDashboard();break;
    case 'my-tasks': c.innerHTML=renderMyTasks();break;
    case 'space': c.innerHTML=renderSpaceView();break;
    case 'folder': c.innerHTML=renderFolderView();break;
    case 'list-view': c.innerHTML=renderListView();break;
    case 'goals': c.innerHTML=renderGoals();break;
    case 'docs': c.innerHTML=renderDocs();break;
    case 'automations': c.innerHTML=renderAutomations();break;
    case 'time': c.innerHTML=renderTime();break;
    case 'settings': c.innerHTML=renderSettings();break;
    case 'inbox': c.innerHTML=renderInbox();break;
    case 'someday': c.innerHTML=renderSomeday();break;

    setTimeout(enableBoardDragDrop,30);
  }
}

function renderDashboard(){
  const allTasks=DB.tasks;
  const done=allTasks.filter(t=>t.status==='הושלם').length;
  const inProgress=allTasks.filter(t=>t.status==='בביצוע').length;
  const overdue=allTasks.filter(t=>t.due&&new Date(t.due)<new Date()&&t.status!=='הושלם').length;
  const today=new Date().toISOString().slice(0,10);
  const todayTasks=allTasks.filter(t=>t.due===today&&t.status!=='הושלם');
  const recentTasks=allTasks.slice(-5).reverse();
  const totalTime=DB.tasks.reduce((a,t)=>a+(t.timeSpent||0),0);
  const inboxPending=(DB.inbox||[]).filter(i=>!i.processed).length;
  const pct=allTasks.length?Math.round(done/allTasks.length*100):0;
  const statusCounts=DB.customStatuses.map(s=>({name:s,count:allTasks.filter(t=>t.status===s).length}));
  if(window.innerWidth<=768) return renderDashboardMobile({allTasks,done,inProgress,overdue,todayTasks,recentTasks,totalTime,inboxPending,pct,statusCounts});
  return renderDashboardDesktop({allTasks,done,inProgress,overdue,todayTasks,recentTasks,totalTime,inboxPending,pct,statusCounts});
}

function renderMyTasks(){
  const today=new Date().toISOString().slice(0,10);
  // FIX-2: when there is an active global search, include completed tasks too
  // (so the user can find finished work), and filter by name/description.
  const q=(state.searchQuery||'').toLowerCase().trim();
  let tasks=q ? DB.tasks.slice() : DB.tasks.filter(t=>t.status!=='הושלם');
  if(q){
    tasks=tasks.filter(t=>
      (t.name||'').toLowerCase().includes(q)||
      (t.desc||'').toLowerCase().includes(q)||
      (t.tags||[]).some(tag=>(tag||'').toLowerCase().includes(q))
    );
  }

  if(state.myFilterStatus.length)
    tasks=tasks.filter(t=>state.myFilterStatus.includes(t.status));
  if(state.myFilterPriority.length)
    tasks=tasks.filter(t=>state.myFilterPriority.includes(t.priority));
  const now=new Date();
  if(state.myFilterDue==='today')
    tasks=tasks.filter(t=>t.due===today);
  else if(state.myFilterDue==='week'){
    const week=new Date();week.setDate(week.getDate()+7);
    tasks=tasks.filter(t=>t.due&&new Date(t.due)<=week&&t.status!=='הושלם');
  } else if(state.myFilterDue==='overdue')
    tasks=tasks.filter(t=>t.due&&new Date(t.due)<now&&t.status!=='הושלם');
  else if(state.myFilterDue==='nodate')
    tasks=tasks.filter(t=>!t.due);

  const PRIO_ORDER={'דחופה':0,'גבוהה':1,'בינונית':2,'נמוכה':3,'ללא':4};
  if(state.mySort==='priority')
    tasks=[...tasks].sort((a,b)=>(PRIO_ORDER[a.priority]||4)-(PRIO_ORDER[b.priority]||4));
  else if(state.mySort==='due')
    tasks=[...tasks].sort((a,b)=>{
      if(!a.due&&!b.due) return 0;
      if(!a.due) return 1;
      if(!b.due) return -1;
      return new Date(a.due)-new Date(b.due);
    });
  else if(state.mySort==='status')
    tasks=[...tasks].sort((a,b)=>DB.customStatuses.indexOf(a.status)-DB.customStatuses.indexOf(b.status));
  else if(state.mySort==='name')
    tasks=[...tasks].sort((a,b)=>a.name.localeCompare(b.name,'he'));
  else if(state.mySort==='created')
    tasks=[...tasks].sort((a,b)=>new Date(b.created)-new Date(a.created));

  const allTasksOpen=DB.tasks.filter(t=>t.status!=='הושלם');
  const statuses=[...new Set(allTasksOpen.map(t=>t.status))];
  const priorities=[...new Set(allTasksOpen.map(t=>t.priority))];
  const hasFilters=state.myFilterStatus.length||state.myFilterPriority.length||state.myFilterDue!=='all';
  const useGroups=!state.myFilterStatus.length&&state.mySort==='priority';
  const filterOpen=state.myFilterOpen||false;

        <span style="font-size:13px;font-weight:600;color:var(--accent2);flex:1">${escHtml(state.searchQuery)}</span>

    ${hasFilters?`
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
        ${state.myFilterStatus.map(s=>`
          <span class="filter-chip active" onclick="toggleMyFilter('status','${escJs(s)}')">
            <span style="width:6px;height:6px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'};display:inline-block"></span>
            ${escHtml(s)} ✕
          </span>`).join('')}
        ${state.myFilterPriority.map(p=>`
          <span class="filter-chip active" onclick="toggleMyFilter('priority','${escJs(p)}')">${PRIORITY_ICONS[p]||''} ${escHtml(p)} ✕</span>`).join('')}
        ${state.myFilterDue!=='all'?`<span class="filter-chip active" onclick="setMyDueFilter('all')">${{today:'היום',week:'השבוע',overdue:'⚠️ באיחור',nodate:'ללא תאריך'}[state.myFilterDue]} ✕</span>`:''}
        ${state.mySort!=='priority'?`<span class="filter-chip active" onclick="setMySort('priority')">↕ ${state.mySort==='due'?'תאריך':state.mySort==='status'?'סטטוס':state.mySort==='name'?'שם':'נוצר'} ✕</span>`:''}
      </div>
    `:''}

    ${filterOpen?`
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">סטטוס</span>
          ${statuses.map(s=>`
            <button class="filter-chip${state.myFilterStatus.includes(s)?' active':''}" style="padding:3px 8px;font-size:11px" onclick="toggleMyFilter('status','${escJs(s)}')">
              <span style="width:6px;height:6px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'};display:inline-block"></span> ${escHtml(s)}
            </button>`).join('')}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">עדיפות</span>
          ${['דחופה','גבוהה','בינונית','נמוכה','ללא'].filter(p=>priorities.includes(p)).map(p=>`
            <button class="filter-chip${state.myFilterPriority.includes(p)?' active':''}" style="padding:3px 8px;font-size:11px" onclick="toggleMyFilter('priority','${escJs(p)}')">${PRIORITY_ICONS[p]||''} ${escHtml(p)}</button>`).join('')}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">יעד</span>
          ${[{val:'all',label:'הכל'},{val:'today',label:'היום'},{val:'week',label:'השבוע'},{val:'overdue',label:'⚠️ באיחור'},{val:'nodate',label:'ללא תאריך'}].map(o=>`
            <button class="filter-chip${state.myFilterDue===o.val?' active':''}" style="padding:3px 8px;font-size:11px" onclick="setMyDueFilter('${o.val}')">${o.label}</button>`).join('')}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span style="font-size:11px;font-weight:600;color:var(--text3);min-width:40px">מיין</span>
          ${[{val:'priority',label:'עדיפות'},{val:'due',label:'תאריך'},{val:'status',label:'סטטוס'},{val:'name',label:'שם'},{val:'created',label:'נוצר'}].map(o=>`
            <button class="filter-chip${state.mySort===o.val?' active':''}" style="padding:3px 8px;font-size:11px" onclick="setMySort('${o.val}')">${o.label}</button>`).join('')}
        </div>
      </div>
    `:''}

    <div class="list-view">
      ${useGroups ? renderMyTaskGroups(tasks) : renderMyTaskFlat(tasks)}
      ${!tasks.length?`<div class="empty-state"><div class="icon">✅</div><h3>אין משימות</h3><p>${hasFilters?'לא נמצאו משימות עם הפילטרים הנוכחיים':'כל המשימות הושלמו!'}</p></div>`:''}
    </div>
  `;
}

function renderMyTaskGroups(tasks){
  // urgent goes first regardless of status
  const urgent=tasks.filter(t=>t.priority==='דחופה'&&t.status!=='הושלם');
  const urgentIds=new Set(urgent.map(t=>t.id));
  // one group per status (dynamic — includes custom statuses)
  const statusGroups=DB.customStatuses.map(st=>({
    name:st,
    color:STATUS_COLORS[st]||'#606078',
    tasks:tasks.filter(t=>t.status===st&&!urgentIds.has(t.id))
  }));
  const groups=[
    {name:'🔴 דחוף',color:'#f76a6a',tasks:urgent},
    ...statusGroups
  ];
  return groups.filter(g=>g.tasks.length).map(g=>renderGroup(g,true,false)).join('');
}

function renderMyTaskFlat(tasks){
  if(!tasks.length) return '';
  const g={name:`${tasks.length} משימות`,color:'#7c6af7',tasks};
  return renderGroup(g,true,false);
}

function toggleMyFilter(type,val){
  const arr=type==='status'?state.myFilterStatus:state.myFilterPriority;
  const i=arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  renderContent();
}
function setMyDueFilter(val){state.myFilterDue=val;renderContent();}
function setMySort(val){state.mySort=val;renderContent();}
function clearMyFilters(){
  state.myFilterStatus=[];state.myFilterPriority=[];
  state.myFilterDue='all';state.mySort='priority';
  renderContent();
}

function renderListView(){
  const li=DB.lists.find(l=>l.id===state.list);
  if(!li) return '';

  tasks=applyFilters(tasks);

  if(state.taskView==='calendar') return renderCalendarView(tasks);
  if(state.taskView==='gantt') return renderGanttView(tasks);

  const statuses=DB.customStatuses;
  const groups=statuses.map(s=>({
    name:s,color:STATUS_COLORS[s]||'#606078',

  })).filter(g=>g.tasks.length);

    ${renderFilterBar(tasks)}
    <div class="list-view">

        <div style="width:100px" class="col" onclick="sortBy('status')">סטטוס</div>
        <div style="width:80px" class="col" onclick="sortBy('priority')">עדיפות</div>
        <div style="width:80px" class="col" onclick="sortBy('assignee')">אחראי</div>

      <div class="add-task-row" onclick="openNewTaskModal()">
        <span>+</span><span>הוסף משימה</span>
      </div>
    </div>
  `;
}

function renderGroup(g,compact,allowQuickAdd){
  // FIX #20: sanitize group name for use as DOM id
  const groupId='grp_'+g.name.replace(/[^a-zA-Z0-9א-ת]/g,'_');
  return `
    <div class="list-group">
      <div class="list-group-header" onclick="toggleGroup(this)">
        <div class="list-group-color" style="background:${escAttr(g.color)}"></div>
        <span class="list-group-name">${escHtml(g.name)}</span>
        <span class="list-group-count">${g.tasks.length}</span>
        <span class="list-group-arrow open">▶</span>
      </div>
      <div class="list-group-body" style="display:block">
        ${g.tasks.map(t=>compact?renderTaskRowCompact(t):renderTaskRow(t)).join('')}
        ${allowQuickAdd?`
        <div class="quick-add-row" id="${groupId}_qa">
          <div class="quick-add-trigger" onclick="activateQuickAdd('${escJs(groupId)}','${escJs(g.name)}')">
            <span class="quick-add-plus">+</span>
            <span class="quick-add-label">הוסף משימה</span>
          </div>
          <div class="quick-add-form" id="${groupId}_form" style="display:none">
            <input
              class="quick-add-input"
              id="${groupId}_input"
              placeholder="שם המשימה... Enter לשמירה, Esc לביטול"
              onkeydown="quickAddKeydown(event,'${escJs(groupId)}','${escJs(g.name)}')"
              onblur="deactivateQuickAdd('${escJs(groupId)}')"
            >
            <button class="quick-add-btn" onmousedown="event.preventDefault();quickAddSave('${escJs(groupId)}','${escJs(g.name)}')">✓</button>
          </div>
        </div>`:''}
      </div>
    </div>
  `;
}

function toggleGroup(el){
  const body=el.nextElementSibling;
  const arrow=el.querySelector('.list-group-arrow');
  if(body.style.display==='none'){body.style.display='block';arrow.classList.add('open');}
  else{body.style.display='none';arrow.classList.remove('open');}
}

function activateQuickAdd(groupId,statusName){
  const trigger=document.querySelector(`#${groupId}_qa .quick-add-trigger`);
  const form=document.getElementById(`${groupId}_form`);
  const input=document.getElementById(`${groupId}_input`);
  if(!trigger||!form||!input) return;
  trigger.style.display='none';
  form.style.display='flex';
  input.focus();
}

function deactivateQuickAdd(groupId){
  const trigger=document.querySelector(`#${groupId}_qa .quick-add-trigger`);
  const form=document.getElementById(`${groupId}_form`);
  const input=document.getElementById(`${groupId}_input`);
  if(!trigger||!form||!input) return;
  setTimeout(()=>{
    if(document.activeElement!==input){
      form.style.display='none';
      trigger.style.display='flex';
      input.value='';
    }
  },150);
}

function quickAddKeydown(e,groupId,statusName){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();quickAddSave(groupId,statusName);}
  if(e.key==='Escape'){deactivateQuickAdd(groupId);document.getElementById(`${groupId}_input`).value='';}
}

function quickAddSave(groupId,statusName){
  const input=document.getElementById(`${groupId}_input`);
  const name=input?.value?.trim();
  if(!name) return;
  const task={
    id:uid(),
    listId:state.list||DB.lists[0]?.id,
    name,desc:'',
    status:statusName||DB.customStatuses[0]||'לביצוע',
    priority:'בינונית',
    due:'',assignee:DB.user.avatar,tags:[],
    created:new Date().toISOString().slice(0,10),
    timeSpent:0,subtasks:[],customFields:{},comments:[],activity:[]
  };
  DB.tasks.push(task);
  saveDB();
  input.value='';
  renderContent();
  setTimeout(()=>activateQuickAdd(groupId,statusName),30);
}

function renderTaskRow(t){
  const due=t.due?new Date(t.due):null;
  const now=new Date();
  const dueClass=due?(due<now&&t.status!=='הושלם'?'overdue':due.toISOString().slice(0,10)===now.toISOString().slice(0,10)?'today':''):'';
  return `
    <div class="task-row" onclick="openTask('${escJs(t.id)}')">
      <div class="task-check" onclick="event.stopPropagation()">
        <input type="checkbox" ${t.status==='הושלם'?'checked':''} onchange="toggleTaskDone('${escJs(t.id)}',this.checked)">
      </div>
      <div class="task-main">
        <div class="task-name${t.status==='הושלם'?' done':''}">${escHtml(t.name)}</div>
        <div class="task-tags">${(t.tags||[]).map(tg=>`<span class="tag tag-${tagColor(tg)}">${escHtml(tg)}</span>`).join('')}</div>
      </div>
      <div class="task-meta">
        <div style="width:100px" onclick="event.stopPropagation()">
          <span class="status-badge" style="background:${STATUS_COLORS[t.status]||'#606078'}22;color:${STATUS_COLORS[t.status]||'#606078'};font-size:11px;cursor:pointer" onclick="openStatusPicker(event,'${escJs(t.id)}')">${escHtml(t.status)} ▾</span>
        </div>
        <div style="width:80px">
          <span class="priority-badge" style="background:${PRIORITY_COLORS[t.priority]||'#606078'}22;color:${PRIORITY_COLORS[t.priority]||'#606078'};font-size:11px">${PRIORITY_ICONS[t.priority]||''} ${escHtml(t.priority)}</span>
        </div>
        <div style="width:80px">
          ${t.assignee?`<div class="task-assignee" style="background:var(--accent);color:#fff">${escHtml(t.assignee)}</div>`:'<span style="color:var(--text3);font-size:12px">—</span>'}
        </div>
        <div style="width:90px">
          <span class="task-due ${dueClass}">${t.due?formatDate(t.due):'—'}</span>
        </div>
        <div style="width:60px;display:flex;gap:4px;align-items:center">
          ${t.subtasks&&t.subtasks.length?`<span class="task-subtask-count">⊙ ${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>`:''}
          ${t.recurrence?`<span style="font-size:10px;color:var(--accent2)" title="${escAttr(RECURRENCE_LABELS[t.recurrence]||t.recurrence)}">🔄</span>`:''}
        </div>
      </div>
    </div>
  `;
}

function renderTaskRowCompact(t){

  const now=new Date();
  const dueClass=due?(due<now&&t.status!=='הושלם'?'overdue':due.toISOString().slice(0,10)===now.toISOString().slice(0,10)?'today':''):'';
  return `
    <div class="task-row" onclick="openTask('${escJs(t.id)}')">
      <div class="task-check" onclick="event.stopPropagation()">
        <input type="checkbox" ${t.status==='הושלם'?'checked':''} onchange="toggleTaskDone('${escJs(t.id)}',this.checked)">
      </div>
      <div class="task-main">
        <div class="task-name${t.status==='הושלם'?' done':''}">${escHtml(t.name)}</div>
        <div class="task-tags">${(t.tags||[]).map(tg=>`<span class="tag tag-${tagColor(tg)}">${escHtml(tg)}</span>`).join('')}</div>
      </div>
      <div class="task-meta" onclick="event.stopPropagation()">
        <span class="status-badge" style="background:${STATUS_COLORS[t.status]||'#606078'}22;color:${STATUS_COLORS[t.status]||'#606078'};font-size:11px;cursor:pointer" onclick="openStatusPicker(event,'${escJs(t.id)}')">${escHtml(t.status)} ▾</span>
        ${t.priority&&t.priority!=='ללא'?`<span class="priority-badge" style="background:${PRIORITY_COLORS[t.priority]||'#606078'}22;color:${PRIORITY_COLORS[t.priority]||'#606078'};font-size:11px">${PRIORITY_ICONS[t.priority]||''} ${escHtml(t.priority)}</span>`:''}
        ${t.due?`<span class="task-due ${dueClass}" style="font-size:11px">${formatDate(t.due)}</span>`:''}
      </div>
    </div>
  `;

// FIX #32: board drag & drop
let _dragTaskId=null;
function enableBoardDragDrop(){
  document.querySelectorAll('.board-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      _dragTaskId=card.dataset.taskId;
      card.classList.add('dragging');
      if(e.dataTransfer){e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',_dragTaskId);}
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      _dragTaskId=null;
    });
  });
  document.querySelectorAll('.board-col-body').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();
      col.classList.remove('drag-over');
      const newStatus=col.dataset.status;
      if(_dragTaskId&&newStatus){
        const t=DB.tasks.find(x=>x.id===_dragTaskId);
        if(t&&t.status!==newStatus){
          t.status=newStatus;
          saveDB();
          renderContent();
          showToast(`הועבר ל"${newStatus}" ✓`);
        }
      }
    });
  });
}

function renderCalendarView(tasks){
  const year=state.calYear,month=state.calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const monthNames=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const dayNames=['א','ב','ג','ד','ה','ו','ש'];

  let cells='';
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const day=i-firstDay+1;
    const isCurrentMonth=day>0&&day<=daysInMonth;
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=isCurrentMonth&&today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
    const dayTasks=isCurrentMonth?tasks.filter(t=>t.due===dateStr):[];
    const maxShow=3;
    cells+=`
      <div class="cal-cell${!isCurrentMonth?' other-month':''}${isToday?' today':''}">
        <div class="cal-date">${isCurrentMonth?day:''}</div>
        ${dayTasks.slice(0,maxShow).map(t=>`
          <div class="cal-task" style="background:${STATUS_COLORS[t.status]||'#606078'}33;color:${STATUS_COLORS[t.status]||'#606078'}" onclick="event.stopPropagation();openTask('${escJs(t.id)}')">${escHtml(t.name)}</div>
        `).join('')}
        ${dayTasks.length>maxShow?`<div class="cal-more">+${dayTasks.length-maxShow} עוד</div>`:''}
      </div>
    `;
  }

  return `
    <div class="calendar-view">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">‹</button>
          <button class="btn btn-ghost btn-sm" onclick="calNav(1)">›</button>
        </div>
        <div class="cal-title">${escHtml(monthNames[month])} ${year}</div>
        <button class="btn btn-ghost btn-sm" onclick="calToday()">היום</button>
      </div>
      <div class="cal-grid">
        ${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function calNav(dir){state.calMonth+=dir;if(state.calMonth>11){state.calMonth=0;state.calYear++;}if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderContent();}
function calToday(){state.calMonth=new Date().getMonth();state.calYear=new Date().getFullYear();renderContent();}

// ============================================================
// GANTT VIEW
// ============================================================
function renderGanttView(tasks){
  const today=new Date();
  const startDate=new Date(today);startDate.setDate(today.getDate()-7);
  const days=30;
  const DAY_W=36;

  const headers=[];
  for(let i=0;i<days;i++){
    const d=new Date(startDate);d.setDate(startDate.getDate()+i);
    headers.push({date:d,label:`${d.getDate()}/${d.getMonth()+1}`});
  }

  const todayOffset=Math.floor((today-startDate)/(1000*60*60*24));
  const tasksWithDates=tasks.filter(t=>t.due);

  return `
    <div class="gantt-view">
      <div class="gantt-wrap">
        <div class="gantt-left">
          <div class="gantt-header">שם המשימה</div>
          ${tasksWithDates.map(t=>`
            <div class="gantt-row" onclick="openTask('${escJs(t.id)}')">
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px">${escHtml(t.name)}</span>
            </div>
          `).join('')}
        </div>
        <div class="gantt-right" style="overflow-x:auto">
          <div class="gantt-timeline-header" style="width:${days*DAY_W}px;position:relative">
            ${headers.map((h,i)=>`<div class="gantt-day-label" style="right:${i*DAY_W}px;width:${DAY_W}px;${h.date.getDay()===0||h.date.getDay()===6?'color:var(--text3)':''}">${h.label}</div>`).join('')}
          </div>
          <div style="position:relative;width:${days*DAY_W}px">
            <div class="gantt-today-line" style="right:${todayOffset*DAY_W}px"></div>
            ${tasksWithDates.map(t=>{
              const dueD=new Date(t.due);
              const startD=t.startDate?new Date(t.startDate):new Date(dueD);startD.setDate(dueD.getDate()-3);
              const startOffset=Math.floor((startD-startDate)/(1000*60*60*24));
              const endOffset=Math.floor((dueD-startDate)/(1000*60*60*24));
              const width=Math.max(1,endOffset-startOffset)*DAY_W;
              const left=Math.max(0,startOffset)*DAY_W;
              const color=STATUS_COLORS[t.status]||'#7c6af7';
              return `
                <div class="gantt-timeline-row" style="width:${days*DAY_W}px">
                  ${startOffset<days&&endOffset>0?`<div class="gantt-bar" style="right:${left}px;width:${width}px;background:${color}" onclick="openTask('${escJs(t.id)}')">${escHtml(t.name)}</div>`:''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function unlinkFromGoal(taskId){

  (t.activity=t.activity||[]).push({text:'הוסר שיוך ליעד',ts:nowTs()});
  // FIX-10: targeted goal recalc
  if(oldGoalId) recalcGoalProgressFor(oldGoalId);
  saveDB();renderContent();
}

// FIX-3: separate timers for title vs body so they don't cancel each other,
// and a flush() helper that runs saves immediately (used from beforeunload/visibilitychange).
let _docTitleSaveTimer=null;
let _docBodySaveTimer=null;
let _pendingDocId=null;
function flushDocSave(){
  if(!_pendingDocId) return;
  const d=DB.docs.find(x=>x.id===_pendingDocId);
  if(!d) {_pendingDocId=null;return;}
  const body=document.getElementById('docBody');
  if(body) d.content=body.innerHTML;
  const titleInput=document.querySelector('.doc-editor-title');
  if(titleInput) d.title=titleInput.value;
  d.updated=new Date().toISOString().slice(0,10);
  clearTimeout(_docTitleSaveTimer);
  clearTimeout(_docBodySaveTimer);
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));}catch(e){}
}
function updateDocTitle(id,val){
  const d=DB.docs.find(x=>x.id===id);
  if(!d) return;
  d.title=val;
  _pendingDocId=id;
  clearTimeout(_docTitleSaveTimer);
  _docTitleSaveTimer=setTimeout(()=>saveDB(),500);
}
function saveDoc(id){
  const body=document.getElementById('docBody');
  if(body){const d=DB.docs.find(x=>x.id===id);if(d){d.content=body.innerHTML;d.updated=new Date().toISOString().slice(0,10);saveDB();}}
  showToast('מסמך נשמר ✓');
}
function autoSaveDoc(id){
  const body=document.getElementById('docBody');
  if(!body) return;
  _pendingDocId=id;
  clearTimeout(_docBodySaveTimer);
  _docBodySaveTimer=setTimeout(()=>{
    const d=DB.docs.find(x=>x.id===id);
    if(d){d.content=body.innerHTML;d.updated=new Date().toISOString().slice(0,10);saveDB();}
  },800);
}
function docFmt(cmd){document.execCommand(cmd);}
function docInsertHeading(){document.execCommand('formatBlock',false,'h2');}
function deleteDoc(id){
  const d=DB.docs.find(x=>x.id===id);
  if(!d) return;
  confirmDialog(`למחוק את המסמך "${d.title}"?`,()=>{
    takeSnapshot(`נמחק מסמך "${d.title}"`);
    DB.docs=DB.docs.filter(x=>x.id!==id);
    saveDB();renderContent();
  });
}

// FIX #1: startTimer — sel variable now properly defined
function startTimer(){
  const sel=document.getElementById('timerTaskSel');
  if(!sel||!sel.value){showToast('בחר משימה ⚠️');return;}
  state.timerTask=sel.value;
  state.timerRunning=true;
  state.timerStart=Date.now()-state.timerSeconds*1000;
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.timerSeconds=Math.floor((Date.now()-state.timerStart)/1000);
    const disp=document.getElementById('timerDisplay');
    if(disp) disp.textContent=formatTimer(state.timerSeconds);
  },1000);
  renderContent();
}

function stopTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval=null;
  state.timerRunning=false;
  if(state.timerTask&&state.timerSeconds>0){
    const t=DB.tasks.find(x=>x.id===state.timerTask);
    if(t){t.timeSpent=(t.timeSpent||0)+Math.round(state.timerSeconds/60);}
    DB.timeEntries=DB.timeEntries||[];
    DB.timeEntries.push({
      id:uid(),
      taskId:state.timerTask,
      seconds:state.timerSeconds,
      date:new Date().toISOString().slice(0,10)
    });
    saveDB();
    showToast(`נרשם: ${formatTimer(state.timerSeconds)} ✓`);
  }
  state.timerSeconds=0;
  state.timerTask=null;
  state.timerStart=null;
  renderContent();
}

// FIX-9: deleting a time entry now also subtracts its minutes from the linked
// task's timeSpent. Previously the task's total would drift higher than the sum
// of logged entries because only the entry was removed, not the task total.
function deleteTimeEntry(id){
  const entry=(DB.timeEntries||[]).find(e=>e.id===id);
  if(entry){
    const t=DB.tasks.find(x=>x.id===entry.taskId);
    if(t){
      const minutes=Math.round((entry.seconds||0)/60);
      t.timeSpent=Math.max(0,(t.timeSpent||0)-minutes);
    }
  }
  DB.timeEntries=(DB.timeEntries||[]).filter(e=>e.id!==id);
  saveDB();renderContent();
}

function formatTimer(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function startTimerForTask(taskId){
  if(state.timerRunning){
    confirmDialog('יש טיימר פעיל. לעצור אותו ולהתחיל חדש?',()=>{
      stopTimer();
      state.timerTask=taskId;
      navigate('time');
      setTimeout(startTimer,100);
    });
    return;
  }
  state.timerTask=taskId;
  navigate('time');
  setTimeout(startTimer,100);
}

    saveDB();renderContent();
  }
}

function getItemAge(date){
  if(!date) return '';
  const diff=Math.floor((new Date()-new Date(date))/(1000*60*60*24));
  if(diff===0) return 'היום';
  if(diff===1) return 'אתמול';
  if(diff<7) return `לפני ${diff} ימים`;
  if(diff<30) return `לפני ${Math.floor(diff/7)} שבועות`;
  return `לפני ${Math.floor(diff/30)} חודשים`;
}

    id:uid(),

    type:state.inboxType||'task',
    processed:false,
    created:new Date().toISOString().slice(0,10)
  });
  saveDB();
  if(ta){ ta.value=''; ta.style.height='auto'; }
  renderContent();
  // keep focus on textarea for streaming capture
  setTimeout(()=>{
    const t2=document.getElementById('inboxInput');
    if(t2){t2.focus();t2.scrollIntoView({behavior:'smooth',block:'nearest'});}
  },50);
  // light haptic confirmation on mobile
  if(navigator.vibrate) try{navigator.vibrate(10);}catch(e){}
}

// FIX-8: optional `silent` mode avoids an intermediate renderContent() between
// guided steps (processing many inbox items in a row). The final step's
// processItemGuided() opens the next modal / renders when guided flow ends.
function markProcessed(id,silent){
  const it=DB.inbox.find(x=>x.id===id);
  if(it){it.processed=true;saveDB();if(!silent)renderContent();}
}

function deleteInboxItem(id){
  DB.inbox=DB.inbox.filter(x=>x.id!==id);
  saveDB();renderContent();
}

function clearProcessed(){
  confirmDialog('למחוק את כל הפריטים שעובדו?',()=>{
    DB.inbox=(DB.inbox||[]).filter(x=>!x.processed);
    saveDB();renderContent();
  });
}

function processAll(){
  const items=(DB.inbox||[]).filter(i=>!i.processed);
  if(!items.length){showToast('אין פריטים לעיבוד');return;}
  state._guidedItems=items.map(i=>i.id);
  state._guidedIdx=0;
  processItemGuided();
}

function processItemGuided(){
  if(!state._guidedItems||state._guidedIdx>=state._guidedItems.length){
    closeModal();
    showToast('כל הפריטים עובדו ✓');
    state._guidedItems=null;
    renderContent();
    return;
  }
  const id=state._guidedItems[state._guidedIdx];
  const it=DB.inbox.find(x=>x.id===id);
  if(!it||it.processed){state._guidedIdx++;processItemGuided();return;}
  const total=state._guidedItems.length;
  const idx=state._guidedIdx+1;
  showModal(`
    <div class="modal-header">
      <div class="modal-title-area">
        <div style="font-size:13px;color:var(--text3);margin-bottom:4px">פריט ${idx}/${total}</div>
        <div style="font-size:16px;font-weight:700;line-height:1.4">${escHtml(it.text)}</div>
      </div>
      <button class="modal-close" onclick="closeModal();state._guidedItems=null">✕</button>
    </div>
    <div style="padding:20px">
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">מה זה?</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-ghost" style="justify-content:flex-start;padding:12px" onclick="guidedAction('${escJs(id)}','task')">✓ <b>משימה</b> — פעולה קונקרטית</button>
        <button class="btn btn-ghost" style="justify-content:flex-start;padding:12px" onclick="guidedAction('${escJs(id)}','project')">📁 <b>פרויקט</b> — דורש כמה צעדים</button>
        <button class="btn btn-ghost" style="justify-content:flex-start;padding:12px" onclick="guidedAction('${escJs(id)}','someday')">🌙 <b>יום אחד</b> — לא עכשיו, אולי בעתיד</button>
        <button class="btn btn-ghost" style="justify-content:flex-start;padding:12px" onclick="guidedAction('${escJs(id)}','ref')">📚 <b>מידע</b> — שמור לעיון</button>
        <button class="btn btn-ghost" style="justify-content:flex-start;padding:12px" onclick="guidedAction('${escJs(id)}','waiting')">⏳ <b>ממתין</b> — תלוי באחר</button>
        <button class="btn btn-ghost" style="justify-content:flex-start;padding:12px;color:var(--red)" onclick="guidedAction('${escJs(id)}','delete')">🗑️ <b>מחק</b> — לא רלוונטי</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="guidedNext()">דלג ›</button>
    </div>
  `);
}

function guidedAction(id,action){
  closeModal();
  if(action==='task'){processAsTask(id);return;}
  if(action==='project'){processAsProject(id);return;}
  if(action==='ref'){processAsRef(id);return;}
  if(action==='waiting'){processAsWaiting(id);return;}
  // FIX-8: silent variants skip intermediate renders — guidedNext opens the
  // next modal immediately, so we don't need to repaint the inbox list in
  // between (causes a visible flicker otherwise).
  if(action==='someday'){processAsSomeday(id,true);guidedNext();return;}
  if(action==='delete'){
    DB.inbox=(DB.inbox||[]).filter(x=>x.id!==id);
    saveDB();
    guidedNext();
    return;
  }
}

function guidedNext(){state._guidedIdx++;processItemGuided();}

function renderHelp(){
  const q=(state.helpSearch||'').toLowerCase();
  return `
    <div class="page-title">❓ מדריך שימוש</div>
    <div class="page-subtitle">כל מה שצריך לדעת על האפליקציה</div>
    <input class="form-input" placeholder="🔍 חפש..." value="${escAttr(state.helpSearch||'')}" oninput="state.helpSearch=this.value;renderContent();setTimeout(()=>document.querySelector('.form-input[placeholder*=חפש]')?.focus(),0)" style="max-width:400px;margin-bottom:14px">
    ${HELP_SECTIONS.map((sec,si)=>{
      const items=sec.items.filter(it=>!q||it.q.toLowerCase().includes(q)||it.a.toLowerCase().includes(q));
      if(!items.length) return '';
      return `
        <div class="help-section" style="margin-bottom:10px">
          <div class="help-section-header">
            <span class="help-section-icon">${sec.icon}</span>
            <span class="help-section-title">${escHtml(sec.title)}</span>
            <span class="help-section-count">${items.length}</span>
          </div>
          <div class="help-items">
            ${items.map((it,ii)=>`
              <div class="help-item" id="help_${si}_${ii}">
                <div class="help-q" onclick="toggleHelpItem(${si},${ii})">
                  <span class="help-q-text">${escHtml(it.q)}</span>
                  <span class="help-q-arrow">▶</span>
                </div>
                <div class="help-a" style="display:none">${it.a}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('')}
    ${!HELP_SECTIONS.some(s=>s.items.some(i=>!q||i.q.toLowerCase().includes(q)||i.a.toLowerCase().includes(q)))?
      `<div class="empty-state"><div class="icon">🤷</div><h3>לא נמצאו תוצאות</h3><p>נסה מילת חיפוש אחרת</p></div>`:''}
  `;
}

// FIX #22: toggle logic uses classList state, not style parsing
function toggleHelpItem(si,ii){
  const item=document.getElementById(`help_${si}_${ii}`);
  if(!item) return;
  const a=item.querySelector('.help-a');
  const arrow=item.querySelector('.help-q-arrow');
  const isOpen=item.classList.contains('open');
  if(isOpen){
    item.classList.remove('open');
    a.style.display='none';
    arrow.style.transform='rotate(0deg)';
  } else {
    item.classList.add('open');
    a.style.display='block';
    arrow.style.transform='rotate(90deg)';
  }
}

// FILTER BAR
// ============================================================
function renderFilterBar(tasks){
  const statuses=[...new Set(tasks.map(t=>t.status))];
  const priorities=[...new Set(tasks.map(t=>t.priority))];
  const hasActive=state.filterStatus.length||state.filterPriority.length||state.searchQuery;
  // FEATURE: clear-completed button appears only when looking at a specific list
  // and there are completed tasks IN THAT LIST (we count from the unfiltered list,
  // not from `tasks` which may be already filtered by status chip).
  const completedInList = state.list
    ? DB.tasks.filter(t=>t.listId===state.list&&t.status==='הושלם').length
    : 0;
  return `
    <div class="filter-bar">
      <input class="input" placeholder="🔍 חיפוש..." value="${escAttr(state.searchQuery)}" oninput="state.searchQuery=this.value;renderContent();setTimeout(()=>document.querySelector('.filter-bar .input')?.focus(),0)" style="max-width:220px">
      ${statuses.map(s=>`<span class="filter-chip${state.filterStatus.includes(s)?' active':''}" onclick="toggleFilter('status','${escJs(s)}')"><span style="width:8px;height:8px;border-radius:50%;background:${STATUS_COLORS[s]||'#606078'}"></span>${escHtml(s)}</span>`).join('')}
      ${priorities.map(p=>`<span class="filter-chip${state.filterPriority.includes(p)?' active':''}" onclick="toggleFilter('priority','${escJs(p)}')">${PRIORITY_ICONS[p]||''} ${escHtml(p)}</span>`).join('')}
      ${hasActive?`<button class="btn btn-ghost btn-sm" onclick="clearFilters()">נקה הכל ✕</button>`:''}
      ${completedInList?`<button class="btn btn-ghost btn-sm" style="margin-right:auto;color:var(--text2)" onclick="clearCompletedInList('${escJs(state.list)}')" title="מחיקת כל המשימות שהושלמו ברשימה זו">🗑️ נקה הושלמו (${completedInList})</button>`:''}
    </div>
  `;
}

function toggleFilter(type,val){
  const arr=state.filterStatus;
  const arr2=state.filterPriority;
  if(type==='status'){
    const i=arr.indexOf(val);if(i>-1)arr.splice(i,1);else arr.push(val);
  } else {
    const i=arr2.indexOf(val);if(i>-1)arr2.splice(i,1);else arr2.push(val);
  }
  renderContent();
}
function clearFilters(){state.filterStatus=[];state.filterPriority=[];state.searchQuery='';renderContent();}

function applyFilters(tasks){
  let out=tasks;
  if(state.filterStatus.length) out=out.filter(t=>state.filterStatus.includes(t.status));
  if(state.filterPriority.length) out=out.filter(t=>state.filterPriority.includes(t.priority));
  if(state.searchQuery){const q=state.searchQuery.toLowerCase();out=out.filter(t=>t.name.toLowerCase().includes(q)||(t.desc||'').toLowerCase().includes(q));}
  if(state.sortBy){
    out=[...out].sort((a,b)=>{
      const av=a[state.sortBy]||'';const bv=b[state.sortBy]||'';
      return state.sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);
    });
  }
  return out;
}

// FIX-2: global search actually works now — searchQuery is consumed by renderMyTasks.
// Clearing the search empties state.searchQuery instead of doing nothing.
let _globalSearchTimer=null;
function globalSearchFn(query){
  const q=(query||'').trim();
  clearTimeout(_globalSearchTimer);
  if(!q){
    // empty → clear search and, if we navigated here due to search, leave silently
    if(state.searchQuery){
      state.searchQuery='';
      if(state.view==='my-tasks') renderContent();
    }
    return;
  }
  // tiny debounce so a rapid typist doesn't navigate on every character
  _globalSearchTimer=setTimeout(()=>{
    state.searchQuery=q;
    if(state.view!=='my-tasks'){
      state.view='my-tasks';
      renderAll();
    } else {
      renderContent();
    }
  },180);
}
function clearGlobalSearch(){
  state.searchQuery='';
  const inp=document.getElementById('globalSearch');
  if(inp) inp.value='';
  renderContent();
}

function sortBy(field){
  if(state.sortBy===field){state.sortDir=state.sortDir==='asc'?'desc':'asc';}
  else{state.sortBy=field;state.sortDir='asc';}
  renderContent();
}

// FIX #12: updateTaskField — save without re-rendering modal (only for critical fields)
function updateTaskField(id,field,val){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  const old=t[field];
  t[field]=val;
  (t.activity=t.activity||[]).push({text:`${field} שונה`,ts:nowTs()});
  // FIX-10: targeted goal recalc when status crosses completion boundary
  if(field==='status'&&t.goalId&&(val==='הושלם'||old==='הושלם')) recalcGoalProgressFor(t.goalId);
  saveDB();
  // re-render list content only (not modal) for status/priority/due changes to update the underlying task row
  // but do NOT re-render the modal which would wipe input focus
  if(['status','priority','due','name'].includes(field)){
    // defer to not interrupt typing
    clearTimeout(window._taskFieldRenderTimer);
    window._taskFieldRenderTimer=setTimeout(()=>{
      if(state.view==='list-view'||state.view==='my-tasks'||state.view==='dashboard'){
        // render only if modal isn't actively being edited
        const active=document.activeElement;
        const inModal=active&&document.getElementById('modalBox')?.contains(active);
        if(!inModal) renderContent();
      }
    },400);
  }
}

function updateTaskTags(id,val){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  t.tags=val.split(',').map(s=>s.trim()).filter(Boolean);
  saveDB();
}

function updateTaskGoal(id,goalId){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  const oldGoalId=t.goalId;
  t.goalId=goalId||null;
  (t.activity=t.activity||[]).push({text:goalId?`שויך ליעד`:'הוסר שיוך ליעד',ts:nowTs()});
  // FIX-10: targeted goal recalc — both old and new goal may need updating
  if(oldGoalId&&oldGoalId!==t.goalId) recalcGoalProgressFor(oldGoalId);
  if(t.goalId) recalcGoalProgressFor(t.goalId);
  saveDB();
  // re-render if we're on goals page so counts update
  if(state.view==='goals') renderContent();
}

function toggleTaskDone(id,checked){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  if(checked){
    t.status='הושלם';
    if(t.recurrence&&t.due){
      // FIX-7: next occurrence is based on date of completion (today), not on t.due.
      const todayStr=new Date().toISOString().slice(0,10);
      const next=calcNextDate(todayStr,t.recurrence);
      if(next){
        const copy=JSON.parse(JSON.stringify(t));
        copy.id=uid();copy.status='לביצוע';copy.due=next;
        copy.subtasks=(t.subtasks||[]).map(s=>({...s,done:false}));
        copy.comments=[];copy.timeSpent=0;copy.activity=[];
        DB.tasks.push(copy);
        showToast(`משימה חוזרת נוצרה: ${formatDate(next)} 🔄`);
      }
    }
  } else {
    t.status=DB.customStatuses[0]||'לביצוע';
  }
  (t.activity=t.activity||[]).push({text:checked?'המשימה הושלמה':'המשימה נפתחה מחדש',ts:nowTs()});
  // FIX-10: targeted goal recalc (only when this task is linked to a goal)
  if(t.goalId) recalcGoalProgressFor(t.goalId);
  saveDB();renderContent();
}

function calcNextDate(dateStr,recurrence){
  if(!dateStr||!recurrence) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  if(recurrence==='daily') d.setDate(d.getDate()+1);
  else if(recurrence==='weekly') d.setDate(d.getDate()+7);
  else if(recurrence==='biweekly') d.setDate(d.getDate()+14);
  else if(recurrence==='monthly') d.setMonth(d.getMonth()+1);
  else if(recurrence==='yearly') d.setFullYear(d.getFullYear()+1);
  return d.toISOString().slice(0,10);
}

function deleteTask(id){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  confirmDialog(`למחוק את המשימה "${t.name}"?`,()=>{
    takeSnapshot(`נמחקה משימה "${t.name}"`);
    const gid=t.goalId;
    DB.tasks=DB.tasks.filter(x=>x.id!==id);
    // FIX-10: if the deleted task was linked to a goal, recalc that goal
    if(gid) recalcGoalProgressFor(gid);
    saveDB();closeModal();renderContent();
  });
}

// FEATURE: bulk-clear completed tasks.
// Two entry points: clearCompletedInList(listId) for a single list (button in
// the list header), and clearAllCompleted() for the whole DB (Settings → data).
// Both: confirm dialog, snapshot for undo (8s), targeted goal recalc.
function clearCompletedInList(listId){
  const completed=DB.tasks.filter(t=>t.listId===listId&&t.status==='הושלם');
  if(!completed.length){showToast('אין משימות שהושלמו ברשימה זו');return;}
  const li=DB.lists.find(l=>l.id===listId);
  const listName=li?li.name:'';
  confirmDialog(
    `למחוק ${completed.length} משימות שהושלמו מהרשימה "${listName}"?\nניתן לבטל תוך 8 שניות.`,
    ()=>{
      takeSnapshot(`נמחקו ${completed.length} משימות שהושלמו`);
      const goalIds=new Set(completed.map(t=>t.goalId).filter(Boolean));
      const ids=new Set(completed.map(t=>t.id));
      DB.tasks=DB.tasks.filter(t=>!ids.has(t.id));
      goalIds.forEach(gid=>recalcGoalProgressFor(gid));
      saveDB();renderContent();
      showToast(`נמחקו ${completed.length} משימות ✓`);
    },
    'מחק'
  );
}
function clearAllCompleted(){
  const completed=DB.tasks.filter(t=>t.status==='הושלם');

function egTypeChanged(sel){
  const row=sel.closest('.eg_target_row');
  if(!row) return;
  const current=row.querySelector('[data-field=current]');
  if(sel.value==='task_count'){
    current.disabled=true;
    current.title='מחושב אוטומטית';
  } else {
    current.disabled=false;
    current.title='';
  }
}

  const c=document.getElementById('eg_targets');

  const g=DB.goals.find(x=>x.id===id);
  if(!g) return;
  g.title=document.getElementById('eg_title')?.value?.trim()||g.title;
  g.emoji=document.getElementById('eg_emoji')?.value||g.emoji;
  g.deadline=document.getElementById('eg_deadline')?.value||'';
  const rows=document.querySelectorAll('.eg_target_row');
  g.targets=Array.from(rows).map(r=>{
    const type=r.querySelector('[data-field=type]')?.value||'manual';
    return {
      id:'gt'+uid(),
      name:r.querySelector('[data-field=name]').value.trim()||'יעד',
      current:parseFloat(r.querySelector('[data-field=current]').value)||0,
      total:parseFloat(r.querySelector('[data-field=total]').value)||100,
      unit:r.querySelector('[data-field=unit]').value||'',
      type
    };
  });
  saveDB();closeModal();renderContent();showToast('יעד עודכן ✓');
}

  const g=DB.goals.find(x=>x.id===id);

  confirmDialog(`למחוק את היעד "${g.title}"?`,()=>{
    takeSnapshot(`נמחק יעד "${g.title}"`);
    DB.goals=DB.goals.filter(x=>x.id!==id);
    saveDB();renderContent();
  });
}
