    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="createAuto()">צור</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('na_name')?.focus(),50);
}

function createAuto(){
  const name=document.getElementById('na_name')?.value?.trim();
  const desc=document.getElementById('na_desc')?.value?.trim();
  if(!name){showToast('חובה להזין שם ⚠️');return;}
  DB.automations.push({
    id:'a'+uid(),
    name,
    desc:desc||'',
    icon:document.getElementById('na_icon')?.value||'⚡',
    active:true
  });
  saveDB();closeModal();renderContent();showToast('אוטומציה נוצרה ✓');
}


// ============================================================
// GIST SYNC (FIX #7 - race condition, #25 - loading state)
// ============================================================
async function syncToGist(){
  if(_gistSyncing){showToast('סינכרון כבר פעיל ⏳');return;}
  if(!DB.gistToken||!DB.gistId){showToast('הגדר טוקן ו-Gist ID תחילה ⚠️');return;}
  const btn=document.getElementById('syncUpBtn');
  const orig=btn?.textContent;
  if(btn){btn.disabled=true;btn.textContent='⏳ מסנכרן...';}
  _gistSyncing=true;
  setSyncStatus('pending');
  try{
    const r=await fetch(`https://api.github.com/gists/${DB.gistId}`,{
      method:'PATCH',
      headers:{'Authorization':`token ${DB.gistToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'tasks.json':{content:JSON.stringify(DB,null,2)}}})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    DB.lastSync=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));
    setSyncStatus('synced');
    // FIX-12: manual success resets the auto-sync failure counter
    _gistFailures=0;
    showToast('סונכרן לענן ✓');
  }catch(e){
    setSyncStatus('error');
    showToast('שגיאת סינכרון ⚠️ '+(e.message||''));
  }finally{
    _gistSyncing=false;
    if(btn){btn.disabled=false;btn.textContent=orig||'↑ דחוף לענן';}
  }
}

// FIX-12: silent sync increments a failure counter on error. After 3 failures
// in a row, saveDB() stops scheduling new syncs (see that function) and we
// notify the user once. A successful manual sync resets the counter.
async function syncToGistSilent(){
  if(_gistSyncing) return;
  if(!DB.gistToken||!DB.gistId) return;
  _gistSyncing=true;
  setSyncStatus('pending');
  try{
    const r=await fetch(`https://api.github.com/gists/${DB.gistId}`,{
      method:'PATCH',
      headers:{'Authorization':`token ${DB.gistToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'tasks.json':{content:JSON.stringify(DB,null,2)}}})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    DB.lastSync=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));
    setSyncStatus('synced');
    _gistFailures=0;
  }catch(e){
    setSyncStatus('error');
    _gistFailures++;
    console.warn('silent sync failed ('+_gistFailures+'/'+_gistMaxFailures+'):',e);
    if(_gistFailures>=_gistMaxFailures){
      showToast('סינכרון אוטומטי הושהה — בדוק טוקן בהגדרות ⚠️');
    }
  }finally{
    _gistSyncing=false;
  }
}

async function syncFromGist(){
  if(_gistSyncing){showToast('סינכרון כבר פעיל ⏳');return;}
  if(!DB.gistToken||!DB.gistId){showToast('הגדר טוקן ו-Gist ID תחילה ⚠️');return;}
  const btn=document.getElementById('syncDownBtn');
  const orig=btn?.textContent;
  if(btn){btn.disabled=true;btn.textContent='⏳ מושך...';}
  _gistSyncing=true;
  setSyncStatus('pending');
  try{
    const r=await fetch(`https://api.github.com/gists/${DB.gistId}`,{
      headers:{'Authorization':`token ${DB.gistToken}`}
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    const content=data.files?.['tasks.json']?.content;
    if(!content) throw new Error('No tasks.json in gist');
    const remote=JSON.parse(content);
    // warning if local changes may be lost
    const localSync=DB.lastSync?new Date(DB.lastSync):null;
    const remoteSync=remote.lastSync?new Date(remote.lastSync):null;
    const confirmPull=()=>{
      // preserve credentials
      const tok=DB.gistToken,gid=DB.gistId;
      DB=remote;
      DB.gistToken=tok;DB.gistId=gid;
      saveDBFull();
      setSyncStatus('synced');
      // FIX-12: successful pull also resets the failure counter
      _gistFailures=0;
      renderAll();
      showToast('נמשך מהענן ✓');
    };
    if(localSync&&remoteSync&&localSync>remoteSync){
      confirmDialog('הנתונים המקומיים חדשים יותר מהענן.\nלמשוך בכל זאת (ימחק שינויים מקומיים)?',confirmPull);
    } else {
      confirmPull();
    }
  }catch(e){
    setSyncStatus('error');
    showToast('שגיאה: '+(e.message||''));
  }finally{
    _gistSyncing=false;
    if(btn){btn.disabled=false;btn.textContent=orig||'↓ משוך מהענן';}
  }
}

// ============================================================
// DATA MANAGEMENT
// ============================================================
function exportData(){
  try{
    const data=JSON.stringify(DB,null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`tasks-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('ייצוא הושלם ✓');
  }catch(e){showToast('שגיאה בייצוא ⚠️');}
}

function importDataBtn(){
  document.getElementById('importFile')?.click();
}

function importDataFile(e){
  const file=e.target.files?.[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      confirmDialog('פעולה זו תחליף את כל הנתונים הקיימים.\nלהמשיך?',()=>{
        takeSnapshot('ייבוא נתונים');
        const def=defaultDB();
        DB={...def,...imported};
        DB.settings={...def.settings,...(imported.settings||{})};
        DB.user={...def.user,...(imported.user||{})};
        DB.version=DB_VERSION;
        // FIX-10: full recalc after replacing the whole DB (new goal<->task links)
        DB=ensureGeneralSpace(DB);
        saveDBFull();
        renderAll();
        showToast('ייבוא הושלם ✓');
      });
    }catch(err){showToast('קובץ לא תקין ⚠️');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function resetData(){
  confirmDialog('⚠️ אזהרה!\n\nפעולה זו תמחק את כל הנתונים לצמיתות:\n- כל המרחבים, תיקיות ורשימות\n- כל המשימות וההיסטוריה\n- כל היעדים והמסמכים\n\nאי אפשר לבטל! להמשיך?',()=>{
    takeSnapshot('איפוס מלא');
    localStorage.removeItem(STORAGE_KEY);
    DB=defaultDB();
    // FIX-10: default DB has goals; run full recalc to align with the (empty) task list
    saveDBFull();
    state.view='dashboard';state.space=null;state.folder=null;state.list=null;
    renderAll();
    showToast('הנתונים אופסו ✓');
  });
}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html,alreadyRendered){
  const ov=document.getElementById('modalOverlay');
  const box=document.getElementById('modalBox');
  if(!ov||!box) return;
  if(!alreadyRendered&&html) box.innerHTML=html;
  ov.classList.remove('hidden');
}

function closeModal(){
  const ov=document.getElementById('modalOverlay');
  if(ov) ov.classList.add('hidden');
  // FIX-1: clear the someday conversion flag in case user cancelled mid-flow.
  state._somedayBeingConverted=null;
  // re-render content to reflect any changes made inside the modal
  renderContent();
}

function closeTaskModal(){
  closeModal();
}

function handleOverlayClick(e){
  if(e.target.id==='modalOverlay') closeModal();
}

function confirmDialog(msg,onConfirm,confirmLabel){
  document.getElementById('confirmOverlay')?.remove();
  const ov=document.createElement('div');
  ov.id='confirmOverlay';
  ov.className='confirm-overlay';
  ov.innerHTML=`
    <div class="confirm-box">
      <div class="confirm-msg">${escHtml(msg)}</div>
      <div class="confirm-btns">
        <button class="btn btn-ghost" id="cancelBtn">ביטול</button>
        <button class="btn btn-danger" id="okBtn">${escHtml(confirmLabel||'אישור')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
  ov.querySelector('#cancelBtn').onclick=()=>ov.remove();
  ov.querySelector('#okBtn').onclick=()=>{ov.remove();onConfirm&&onConfirm();};
  ov.addEventListener('click',e=>{if(e.target.id==='confirmOverlay') ov.remove();});
}

// FIX #3: inputDialog replaces prompt() — works in iOS PWA
function inputDialog(msg,defaultVal,onConfirm){
  document.getElementById('confirmOverlay')?.remove();
  const ov=document.createElement('div');
  ov.id='confirmOverlay';
  ov.className='confirm-overlay';
  ov.innerHTML=`
    <div class="confirm-box">
      <div class="confirm-msg">${escHtml(msg)}</div>
      <div class="confirm-input-wrap">
        <input type="text" id="inputDlgField" value="${escAttr(defaultVal||'')}" autofocus>
      </div>
      <div class="confirm-btns">
        <button class="btn btn-ghost" id="cancelBtn">ביטול</button>
        <button class="btn btn-primary" id="okBtn">אישור</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
  const input=ov.querySelector('#inputDlgField');
  setTimeout(()=>input?.focus(),30);
  const ok=()=>{const v=input?.value||'';ov.remove();onConfirm&&onConfirm(v);};
  ov.querySelector('#cancelBtn').onclick=()=>ov.remove();
  ov.querySelector('#okBtn').onclick=ok;
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();ok();}
    if(e.key==='Escape'){ov.remove();}
  });
  ov.addEventListener('click',e=>{if(e.target.id==='confirmOverlay') ov.remove();});
}

// ============================================================
// TOUCH / SWIPE (FIX #5 — correct RTL direction)
// ============================================================
let _touchStartX=null,_touchStartY=null,_touchStartTime=null;

function setupTouch(){
  document.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    _touchStartX=t.clientX;_touchStartY=t.clientY;_touchStartTime=Date.now();
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(_touchStartX===null) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-_touchStartX;
    const dy=t.clientY-_touchStartY;
    const dt=Date.now()-_touchStartTime;
    if(dt>400) return; // too slow
    if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx)) return; // not horizontal

    if(window.innerWidth>768) return; // desktop: skip

    const sb=document.getElementById('sidebar');
    const isOpen=!sb.classList.contains('collapsed');
    // FIX #5: RTL logic — sidebar is on the RIGHT side
    // Swipe RIGHT (dx > 0) when sidebar open = close (moving towards right edge)
    // Swipe LEFT (dx < 0) near right edge = open
    if(isOpen&&dx>50){
      closeSidebarMobile();
    } else if(!isOpen&&dx<-50&&_touchStartX>window.innerWidth-40){
      toggleSidebar();
    }
    _touchStartX=null;_touchStartY=null;_touchStartTime=null;
  },{passive:true});

  // (swipe-down to close modal was removed — users found it too easy to trigger accidentally)
}

// ============================================================
// INIT
// ============================================================
function init(){
  // FIX #2: register document click listener ONCE here, not on every render
  document.addEventListener('click',e=>{
    const panel=document.getElementById('notifPanel');
    if(!panel||panel.classList.contains('hidden')) return;
    if(!panel.contains(e.target)&&!e.target.closest('[onclick*="toggleNotif"]')){
      panel.classList.add('hidden');
    }
  });

  // keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='n'&&!e.target.matches('input,textarea,[contenteditable]')){
      e.preventDefault();openNewTaskModal();
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='i'&&!e.target.matches('input,textarea,[contenteditable]')){
      e.preventDefault();navigate('inbox');
    }
    if(e.key==='Escape'){
      const ov=document.getElementById('modalOverlay');
      if(ov&&!ov.classList.contains('hidden')) closeModal();
      document.getElementById('confirmOverlay')?.remove();
      closeCtxMenu();
    }
  });

  // resize
  let _rzTimer;
  window.addEventListener('resize',()=>{
    clearTimeout(_rzTimer);
    _rzTimer=setTimeout(()=>{
      if(window.innerWidth>768){
        document.getElementById('sidebar-overlay').style.display='none';
        if(state.sidebarOpen) document.getElementById('sidebar').classList.remove('collapsed');
      } else {
        document.getElementById('sidebar').classList.add('collapsed');
      }
      renderMobileViewTabs();
    },120);
  });

  // FIX-3: flush pending doc/title saves before the tab goes away.
  // `beforeunload` covers desktop; `visibilitychange` covers iOS Safari where
  // beforeunload is unreliable. `pagehide` is also safer for bfcache.
  window.addEventListener('beforeunload',flushDocSave);
  window.addEventListener('pagehide',flushDocSave);
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden') flushDocSave();
  });

  // create hidden file input for import
  if(!document.getElementById('importFile')){
    const inp=document.createElement('input');
    inp.type='file';
    inp.id='importFile';
    inp.accept='application/json,.json';
    inp.style.display='none';
    inp.addEventListener('change',importDataFile);
    document.body.appendChild(inp);
  }

  // initial sidebar state for mobile
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.add('collapsed');

  setupTouch();
  setupFab();

  // URL shortcut: ?capture=1 → jump straight to quick-capture
  try{
    const params=new URLSearchParams(location.search);
    if(params.get('capture')==='1'||location.hash==='#capture'){
      // wait for first render, then fire quick capture
      setTimeout(()=>quickCapture(),100);
    }
  }catch(e){}

  // service worker — skip on file:// protocol (#35)
  if('serviceWorker' in navigator&&location.protocol!=='file:'){
    navigator.serviceWorker.register('./sw.js').catch(()=>{/* ignore — sw.js not included */});
  }

  renderAll();
}

// FAB: short tap = contextual action, long press (500ms) = quick capture
function setupFab(){
  const fab=document.getElementById('fab');
  if(!fab) return;
  let pressTimer=null;
  let longPressFired=false;

  const startPress=(e)=>{
    longPressFired=false;
    pressTimer=setTimeout(()=>{
      longPressFired=true;
      fab.style.transform='scale(1.15)';
      quickCapture();
      setTimeout(()=>fab.style.transform='',200);
    },500);
  };
  const cancelPress=()=>{
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
  };
  const endPress=(e)=>{
    if(pressTimer){
      clearTimeout(pressTimer);
      pressTimer=null;
      if(!longPressFired){
        // short tap → normal FAB action
        fabAction();
      }
    }
    // prevent the ghost click after touch
    if(e&&e.type==='touchend') e.preventDefault();
  };

  // touch events (mobile)
  fab.addEventListener('touchstart',startPress,{passive:true});
  fab.addEventListener('touchend',endPress);
  fab.addEventListener('touchcancel',cancelPress);
  fab.addEventListener('touchmove',cancelPress,{passive:true});

  // mouse events (desktop)
  fab.addEventListener('mousedown',startPress);
  fab.addEventListener('mouseup',endPress);
  fab.addEventListener('mouseleave',cancelPress);
}

// start
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
</script>
